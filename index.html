<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NABY KEÏTA COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .neon-text { color: #00f2ff; text-shadow: 0 0 15px rgba(0,242,255,0.7); }
        .status-blink { animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .zone-active { background: #d4af37 !important; color: #000 !important; font-weight: 900; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4 pb-32">

    <header class="flex justify-between items-start mb-6 border-l-4 border-[#00f2ff] pl-4">
        <div>
            <h1 class="text-2xl font-black italic uppercase leading-none">NABY KEÏTA <br><span class="neon-text">COMMAND</span></h1>
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-[0.2em] mt-1">BAD HERSFELD | 05:30 AM EDITION</p>
        </div>
        <div class="text-right glass p-3 rounded-2xl border border-[#d4af37]/30">
            <div id="dbStatus" class="text-[9px] font-black uppercase text-red-500 status-blink">Offline ●</div>
            <div id="liveTemp" class="text-xl font-black text-white italic">4.0°C</div>
        </div>
    </header>

    <div class="flex gap-2 mb-6">
        <button onclick="setZone('FRIDGE')" id="z-FRIDGE" class="flex-1 py-4 bg-[#111] rounded-2xl text-[10px] font-black zone-active uppercase">🧊 Kühl</button>
        <button onclick="setZone('FREEZER')" id="z-FREEZER" class="flex-1 py-4 bg-[#111] rounded-2xl text-[10px] font-black text-gray-600 uppercase">❄️ Frost</button>
        <button onclick="setZone('PANTRY')" id="z-PANTRY" class="flex-1 py-4 bg-[#111] rounded-2xl text-[10px] font-black text-gray-600 uppercase">📦 Vorrat</button>
    </div>

    <div class="glass p-5 rounded-[2.5rem] mb-6 border border-white/5">
        <div class="relative w-full aspect-video bg-black rounded-3xl overflow-hidden flex items-center justify-center">
            <video id="v" autoplay playsinline muted class="hidden w-full h-full object-cover"></video>
            <canvas id="canvas" class="hidden"></canvas>
            <div id="cp" class="text-center text-gray-700 font-black text-[10px] uppercase italic">Scouter Bereit</div>
        </div>
        <button id="sBtn" class="w-full py-5 mt-5 bg-[#00f2ff] text-black font-black rounded-3xl uppercase text-sm shadow-xl active:scale-95 transition-all">Analyse Starten</button>
    </div>

    <div class="glass p-6 rounded-[2.5rem]">
        <div class="flex justify-between items-center mb-6">
            <h3 id="zT" class="text-[11px] font-black text-[#d4af37] uppercase italic">Bestand: Kühl</h3>
            <button id="resetBtn" class="text-[8px] border border-red-500 text-red-500 px-3 py-1.5 rounded-full font-black uppercase">Key Reset</button>
        </div>
        <div id="invList" class="space-y-4 text-xs italic">Sync läuft...</div>
    </div>

    <script>
        // Synchronisiert mit Projekt "gerd"
        const fbConfig = { apiKey: "AIzaSyDqqn39l6M8r-YC-R5utkwfG4En2OfUnpQ", authDomain: "gen-lang-client-0348637849.firebaseapp.com", projectId: "gen-lang-client-0348637849", storageBucket: "gen-lang-client-0348637849.firebasestorage.app", messagingSenderId: "1008937513696", appId: "1:1008937513696:web:1c0a2bc7792daf689a5685" };
        
        let GK = localStorage.getItem('GK');
        function askKey() {
            let k = prompt("HERSFELD LOGIN: Bitte den Key für Projekt 'gerd' (Endung wtkl) eingeben:");
            if (k) { localStorage.setItem('GK', k.trim()); location.reload(); }
        }
        if (!GK) askKey();
        document.getElementById('resetBtn').onclick = () => { localStorage.removeItem('GK'); askKey(); };

        firebase.initializeApp(fbConfig);
        const db = firebase.firestore();
        let curZ = 'FRIDGE', camOn = false, allStock = [];

        function sync() {
            db.collection("inventory").orderBy("addedAt", "desc").onSnapshot(snap => {
                allStock = snap.docs.map(d => ({id: d.id, ...d.data()}));
                document.getElementById('dbStatus').innerText = "Online ●";
                document.getElementById('dbStatus').className = "text-[9px] font-black uppercase text-[#00ff41] status-blink";
                render();
            });
            db.collection("telemetry").doc("fridge_stats").onSnapshot(doc => {
                if(doc.exists) document.getElementById('liveTemp').innerText = doc.data().temp + "°C";
            });
        }

        function render() {
            const list = allStock.filter(i => i.zone === curZ);
            document.getElementById('invList').innerHTML = list.map(i => `
                <div class="flex justify-between items-center py-3 border-b border-white/5">
                    <span class="font-black text-white uppercase italic text-xs tracking-tighter">${i.name}</span>
                    <span class="text-[9px] text-gray-500 font-mono bg-white/5 px-2 py-1 rounded italic uppercase">${i.mhd || 'MHD OFFEN'}</span>
                </div>
            `).join('') || '<p class="text-center py-8 text-gray-800 font-black uppercase text-[9px]">Einheit Leer</p>';
        }

        const video = document.getElementById('v'), sBtn = document.getElementById('sBtn');

        sBtn.addEventListener('click', async () => {
            if (!camOn) {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    video.srcObject = s; video.classList.remove('hidden');
                    document.getElementById('cp').classList.add('hidden');
                    sBtn.innerText = "Einheit Scannen"; camOn = true;
                } catch(e) { alert("Kamera-Fehler!"); }
            } else { analyze(); }
        });

        async function analyze() {
            sBtn.disabled = true; sBtn.innerText = "COMMAND KI PRÜFT...";
            const canvas = document.getElementById('canvas');
            canvas.width = 640; canvas.height = 480;
            canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
            const b64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
            
            try {
                // Stabilste v1 Route für Gemini 1.5 Flash
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${GK}`;
                const res = await fetch(url, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Was ist das? Antwort NUR JSON: { 'name': '...', 'mhd': '...' }" }, { inline_data: { mime_type: "image/jpeg", data: b64 } }] }] })
                });
                const d = await res.json();
                
                if (d.error) {
                    alert("GOOGLE FEHLER: " + d.error.message + "\n\nTipp: Hast du die Generative Language API für Projekt 'gerd' aktiviert?");
                    sBtn.disabled = false; sBtn.innerText = "Einheit Scannen";
                    return;
                }

                if (d.candidates) {
                    const raw = d.candidates[0].content.parts[0].text;
                    const clean = raw.substring(raw.indexOf('{'), raw.lastIndexOf('}') + 1);
                    const data = JSON.parse(clean);
                    await db.collection("inventory").add({ ...data, zone: curZ, addedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    if(navigator.vibrate) navigator.vibrate(100);
                    // Sprachausgabe für Nadine
                    const msg = new SpeechSynthesisUtterance("Ziel erfasst: " + data.name);
                    msg.lang = 'de-DE'; window.speechSynthesis.speak(msg);
                }
            } catch (e) { alert("System-Fehler: " + e.message); }
            sBtn.disabled = false; sBtn.innerText = "Einheit Scannen";
        }

        window.setZone = (z) => {
            curZ = z;
            document.getElementById('zT').innerText = "Inventar: " + (z=='FRIDGE'?'Kühl':z=='FREEZER'?'Frost':'Vorrat');
            ['FRIDGE','FREEZER','PANTRY'].forEach(id => document.getElementById('z-'+id).classList.toggle('zone-active', id === z));
            render();
        };

        sync();
    </script>
</body>
</html>
