<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VITO ELITE V63</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        /* RAW CSS - KEIN TAILWIND - KEIN WHITE SCREEN */
        :root { --neon: #00f2ff; --gold: #d4af37; --bg: #050505; --glass: rgba(255,255,255,0.03); }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        
        /* HEADER */
        .header { border-left: 4px solid var(--neon); padding-left: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .header h1 { margin: 0; font-style: italic; text-transform: uppercase; font-size: 24px; letter-spacing: -1px; }
        .version { font-size: 8px; color: #444; text-transform: uppercase; letter-spacing: 2px; }
        
        /* STATUS BOX */
        .status-box { background: var(--glass); border: 1px solid rgba(212,175,55,0.2); border-radius: 15px; padding: 10px 15px; text-align: right; }
        .status-led { font-size: 9px; font-weight: bold; color: #ff3e3e; text-transform: uppercase; }
        .temp { font-size: 20px; font-weight: 900; font-style: italic; }

        /* ZONES */
        .zones { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 25px; }
        .zone-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 0; color: #666; font-size: 10px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .zone-active { background: var(--gold); color: #000; border: none; box-shadow: 0 0 15px rgba(212,175,55,0.3); }

        /* SCOUTER */
        .scouter-wrap { background: var(--glass); border-radius: 30px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 25px; position: relative; }
        .viewport { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 20px; overflow: hidden; position: relative; border: 1px solid #111; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .scan-line { height: 2px; background: var(--neon); position: absolute; width: 100%; top: 0; animation: scan 2s linear infinite; box-shadow: 0 0 10px var(--neon); z-index: 5; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        
        .main-btn { width: 100%; background: var(--neon); color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 14px; text-transform: uppercase; margin-top: 15px; box-shadow: 0 0 20px rgba(0,242,255,0.2); }
        .main-btn:disabled { background: #004449; color: #008891; }

        /* LIST */
        .inventory { background: var(--glass); border-radius: 30px; padding: 20px; min-h: 200px; text-align: left; }
        .list-header { color: var(--gold); font-size: 11px; font-weight: 900; text-transform: uppercase; border-bottom: 1px solid #111; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #111; }
        .item-name { font-weight: 900; font-style: italic; font-size: 14px; text-transform: uppercase; }
        .item-mhd { font-family: monospace; font-size: 11px; color: var(--gold); border: 1px solid rgba(212,175,55,0.2); padding: 3px 8px; border-radius: 5px; }

        #debug { font-family: monospace; font-size: 8px; color: #333; margin-top: 20px; text-align: left; }
    </style>
</head>
<body>

    <header class="header">
        <div>
            <h1>VITO <span style="color:var(--neon)">COMMAND</span></h1>
            <div class="version">BAD HERSFELD | UNIT V63.0</div>
        </div>
        <div class="status-box">
            <div id="db-led" class="status-led">OFFLINE ●</div>
            <div class="temp" id="temp-val">4.0°C</div>
        </div>
    </header>

    <div class="zones">
        <button onclick="sz('FRIDGE')" id="z-FRIDGE" class="zone-btn zone-active">Kühl</button>
        <button onclick="sz('FREEZER')" id="z-FREEZER" class="zone-btn">Frost</button>
        <button onclick="sz('PANTRY')" id="z-PANTRY" class="zone-btn">Vorrat</button>
    </div>

    <div class="scouter-wrap">
        <div class="viewport">
            <div id="laser" style="display:none;" class="scan-line"></div>
            <video id="vid" autoplay playsinline muted style="display:none;"></video>
            <div id="p-text" style="padding-top:45%; color:#222; font-size:10px; font-weight:bold; letter-spacing:3px;">SCOUTER READY</div>
        </div>
        <button id="sBtn" class="main-btn">Einheit Erfassen</button>
    </div>

    <div class="inventory">
        <div class="list-header">
            <span>Inventar: <span id="z-name">Kühl</span></span>
            <span onclick="localStorage.removeItem('GRK'); location.reload();" style="color: #444; font-size: 8px; cursor: pointer;">RESET KEY</span>
        </div>
        <div id="list-content"></div>
    </div>

    <div id="debug">> System initialisiert...</div>

    <script>
        const dLog = (m) => { document.getElementById('debug').innerHTML += `<br>> ${m}`; console.log(m); };
        
        const cfg = { apiKey: "AIzaSyDqqn39l6M8r-YC-R5utkwfG4En2OfUnpQ", authDomain: "gen-lang-client-0348637849.firebaseapp.com", projectId: "gen-lang-client-0348637849", storageBucket: "gen-lang-client-0348637849.firebasestorage.app", messagingSenderId: "1008937513696", appId: "1:1008937513696:web:1c0a2bc7792daf689a5685" };
        let GRK = localStorage.getItem('GRK'), cz = 'FRIDGE', all = [];

        if(!GRK) { GRK = prompt("Groq Key eingeben (gsk_...):"); if(GRK) localStorage.setItem('GRK', GRK.trim()); }

        try {
            firebase.initializeApp(cfg);
            const db = firebase.firestore();
            dLog("Firebase Connect.");

            db.collection("inventory").orderBy("addedAt", "desc").onSnapshot(s => {
                all = s.docs.map(d => ({id: d.id, ...d.data()}));
                document.getElementById('db-led').innerText = "ONLINE ●";
                document.getElementById('db-led').style.color = "#00ff41";
                render();
            });
            db.collection("telemetry").doc("fridge_stats").onSnapshot(d => { if(d.exists) document.getElementById('temp-val').innerText = d.data().temp + "°C"; });
        } catch(e) { dLog("FEHLER: " + e.message); }

        function render() {
            const f = all.filter(i => i.zone === cz);
            document.getElementById('list-content').innerHTML = f.map(i => `
                <div class="item">
                    <span class="item-name">${i.name}</span>
                    <span class="item-mhd">${i.mhd || 'OFFEN'}</span>
                </div>
            `).join('') || '<div style="text-align:center; padding:30px; color:#222; font-size:10px; font-weight:bold;">ZENTRALE LEER</div>';
        }

        const vid = document.getElementById('vid'), sBtn = document.getElementById('sBtn'), laser = document.getElementById('laser');
        let cam = false;

        sBtn.onclick = async () => {
            if(!cam) {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    vid.srcObject = s; vid.style.display = "block";
                    document.getElementById('p-text').style.display = "none";
                    cam = true; sBtn.innerText = "Analyse Starten";
                } catch(e) { alert("Kamera-Fehler!"); }
            } else {
                analyze();
            }
        };

        async function analyze() {
            sBtn.disabled = true; sBtn.innerText = "KI PRÜFT...";
            laser.style.display = "block";
            const canv = document.createElement('canvas'); canv.width = 640; canv.height = 640;
            canv.getContext('2d').drawImage(vid, 0, 0, 640, 640);
            
            try {
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GRK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.2-11b-vision-preview",
                        messages: [{ role: "user", content: [
                            { type: "text", text: "JSON ONLY: { 'name': 'Produkt', 'mhd': 'Datum' }" },
                            { type: "image_url", image_url: { url: canv.toDataURL('image/jpeg', 0.6) } }
                        ]}]
                    })
                });
                const j = await r.json();
                const d = JSON.parse(j.choices[0].message.content.match(/\{.*\}/s)[0]);
                await firebase.firestore().collection("inventory").add({ ...d, zone: cz, addedAt: firebase.firestore.FieldValue.serverTimestamp() });
                if(navigator.vibrate) navigator.vibrate(100);
            } catch(e) { dLog("KI-FEHLER: " + e.message); }
            sBtn.disabled = false; sBtn.innerText = "Analyse Starten";
            laser.style.display = "none";
        }

        window.sz = (z) => {
            cz = z;
            document.getElementById('z-name').innerText = (z=='FRIDGE'?'Kühl':z=='FREEZER'?'Frost':'Vorrat');
            ['FRIDGE','FREEZER','PANTRY'].forEach(id => document.getElementById('z-'+id).classList.toggle('zone-active', id === z));
            render();
        };
    </script>
</body>
</html>
