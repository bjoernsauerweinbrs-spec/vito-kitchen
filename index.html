<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VITO V55 ULTRA</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        /* RADIKALES NEUES DESIGN: SIGNAL-GELB statt Blau/Grün */
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .header { border-bottom: 2px solid #ffee00; padding-bottom: 10px; margin-bottom: 20px; }
        .version { color: #ffee00; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .scouter { width: 100%; aspect-ratio: 1/1; background: #111; border: 1px solid #333; border-radius: 20px; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-cover: cover; }
        .btn { width: 100%; padding: 20px; background: #ffee00; color: #000; border: none; border-radius: 15px; font-weight: 900; font-size: 16px; margin-top: 15px; text-transform: uppercase; }
        .list-item { border-bottom: 1px solid #222; padding: 12px 0; display: flex; justify-content: space-between; }
        .mhd { color: #ffee00; font-family: monospace; }
        #error-out { color: red; font-size: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-style: italic;">NABY <span style="color:#ffee00">KEÏTA</span></h1>
        <div class="version">DEPLOYMENT: V55.0-ULTRA-STABLE</div>
    </div>

    <div class="scouter" id="scouter-box">
        <video id="v" autoplay playsinline muted style="display:none;"></video>
        <div id="p-text" style="padding-top: 45%; text-align: center; color: #444; font-size: 10px;">KAMERA STANDBY</div>
        <canvas id="c" style="display:none;"></canvas>
    </div>

    <button id="sBtn" class="btn">Scanner Starten</button>

    <div id="error-out"></div>

    <div style="margin-top: 30px;">
        <div style="color:#ffee00; font-size: 11px; font-weight: bold; margin-bottom: 10px;">AKTUELLER BESTAND:</div>
        <div id="inv-list">Warte auf Datenbank...</div>
    </div>

    <script>
        // CONFIG
        const cfg = { apiKey: "AIzaSyDqqn39l6M8r-YC-R5utkwfG4En2OfUnpQ", authDomain: "gen-lang-client-0348637849.firebaseapp.com", projectId: "gen-lang-client-0348637849", storageBucket: "gen-lang-client-0348637849.firebasestorage.app", messagingSenderId: "1008937513696", appId: "1:1008937513696:web:1c0a2bc7792daf689a5685" };
        let GRK = localStorage.getItem('GRK');
        
        // Error Handler
        window.onerror = (m) => { document.getElementById('error-out').innerText = "SYSTEM ERROR: " + m; };

        // Key Check
        if(!GRK) { 
            GRK = prompt("VITO MASTER KEY (Groq) eingeben:"); 
            if(GRK) localStorage.setItem('GRK', GRK.trim()); 
        }

        // Init Firebase
        firebase.initializeApp(cfg);
        const db = firebase.firestore();

        // Sync List
        db.collection("inventory").orderBy("addedAt", "desc").onSnapshot(s => {
            const list = s.docs.map(d => d.data());
            document.getElementById('inv-list').innerHTML = list.map(i => `
                <div class="list-item">
                    <span>${i.name}</span>
                    <span class="mhd">${i.mhd || 'OFFEN'}</span>
                </div>
            `).join('') || 'Keine Daten in Bad Hersfeld.';
        });

        // Camera Logic
        const vid = document.getElementById('v'), sBtn = document.getElementById('sBtn'), pText = document.getElementById('p-text');
        let camActive = false;

        sBtn.onclick = async () => {
            if(!camActive) {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    vid.srcObject = s;
                    vid.style.display = "block";
                    pText.style.display = "none";
                    camActive = true;
                    sBtn.innerText = "PRODUKT SCANNEN";
                } catch(e) { alert("Kamera-Fehler: " + e.message); }
            } else {
                analyze();
            }
        };

        async function analyze() {
            sBtn.disabled = true; sBtn.innerText = "KI PRÜFT...";
            const can = document.getElementById('c');
            can.width = 640; can.height = 640;
            can.getContext('2d').drawImage(vid, 0, 0, 640, 640);
            
            try {
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GRK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.2-11b-vision-preview",
                        messages: [{ role: "user", content: [
                            { type: "text", text: "Analysiere das Bild. Antworte NUR im JSON Format: { 'name': 'Produkt', 'mhd': 'MHD' }. Keine Prosa." },
                            { type: "image_url", image_url: { url: can.toDataURL('image/jpeg', 0.6) } }
                        ]}]
                    })
                });
                const j = await r.json();
                const content = j.choices[0].message.content;
                const d = JSON.parse(content.substring(content.indexOf('{'), content.lastIndexOf('}') + 1));
                
                await db.collection("inventory").add({ ...d, zone: "FRIDGE", addedAt: firebase.firestore.FieldValue.serverTimestamp() });
                window.speechSynthesis.speak(new SpeechSynthesisUtterance("Erfasst: " + d.name));
            } catch(e) { alert("KI-Fehler: Bitte Key prüfen."); }
            
            sBtn.disabled = false; sBtn.innerText = "PRODUKT SCANNEN";
        }
    </script>
</body>
</html>
