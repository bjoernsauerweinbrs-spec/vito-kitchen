<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VITO V65 CORE</title>
    <style>
        /* SOFORT-DESIGN (Lädt ohne Scripte) */
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .ui-box { border: 2px solid #00f2ff; border-radius: 25px; padding: 20px; background: #0a0a0a; box-shadow: 0 0 40px rgba(0,242,255,0.2); margin-top: 20px; }
        .neon-title { color: #00f2ff; font-style: italic; text-transform: uppercase; letter-spacing: -1px; margin: 0; }
        .error-log { color: #ff0000; background: #1a0000; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 10px; text-align: left; margin-top: 20px; border: 1px solid #300; display: none; }
        .btn { width: 100%; padding: 20px; background: #00f2ff; color: #000; border: none; border-radius: 15px; font-weight: 900; font-size: 16px; margin-top: 20px; cursor: pointer; }
        .status-dot { height: 8px; width: 8px; background-color: #ff3e3e; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="ui-box">
        <h1 class="neon-title">VITO <span style="color:#fff">COMMAND</span></h1>
        <p style="font-size: 9px; opacity: 0.5; letter-spacing: 2px;">BAD HERSFELD | HUB V65.0-STABLE</p>
        
        <hr style="border:0; border-top:1px solid #222; margin: 20px 0;">

        <div id="connection-status" style="font-size: 11px; font-weight: bold;">
            <span id="led" class="status-dot"></span> SYSTEM: <span id="status-text">INITIALISIERE...</span>
        </div>

        <div id="camera-area" style="margin-top: 20px;">
            <video id="v" autoplay playsinline muted style="width:100%; border-radius: 15px; background: #111; display:none; aspect-ratio: 1/1; object-fit: cover;"></video>
            <div id="p-text" style="padding: 40px; color: #222; font-weight: 900; font-size: 10px;">WARTE AUF START...</div>
        </div>

        <button id="sBtn" class="btn">SCANNER STARTEN</button>
    </div>

    <div id="error-box" class="error-log"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // ERROR-DETEKTOR
        const errBox = document.getElementById('error-box');
        window.onerror = function(msg, url, line) {
            errBox.style.display = "block";
            errBox.innerHTML += `> ERROR: ${msg} (Zeile: ${line})<br>`;
        };

        const log = (m) => { console.log(m); };

        // CONFIG
        const cfg = { apiKey: "AIzaSyDqqn39l6M8r-YC-R5utkwfG4En2OfUnpQ", authDomain: "gen-lang-client-0348637849.firebaseapp.com", projectId: "gen-lang-client-0348637849", storageBucket: "gen-lang-client-0348637849.firebasestorage.app", messagingSenderId: "1008937513696", appId: "1:1008937513696:web:1c0a2bc7792daf689a5685" };

        async function initSystem() {
            try {
                if (typeof firebase === 'undefined') {
                    throw new Error("Firebase-Script konnte nicht geladen werden. Prüfe Internetverbindung.");
                }
                
                firebase.initializeApp(cfg);
                const db = firebase.firestore();
                
                document.getElementById('led').style.backgroundColor = "#00ff41";
                document.getElementById('status-text').innerText = "LIVE (BAD HERSFELD)";
                log("System bereit.");

                // Key-Check
                if(!localStorage.getItem('GRK')) {
                    const k = prompt("VITO LOGIN: Groq Key eingeben:");
                    if(k) localStorage.setItem('GRK', k.trim());
                }
            } catch (e) {
                errBox.style.display = "block";
                errBox.innerHTML += `> INIT-FEHLER: ${e.message}<br>`;
            }
        }

        const vid = document.getElementById('v'), sBtn = document.getElementById('sBtn'), pText = document.getElementById('p-text');
        let camActive = false;

        sBtn.onclick = async () => {
            if(!camActive) {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    vid.srcObject = s;
                    vid.style.display = "block";
                    pText.style.display = "none";
                    camActive = true;
                    sBtn.innerText = "PRODUKT ANALYSIEREN";
                } catch(e) {
                    alert("Kamera-Fehler: " + e.message);
                }
            } else {
                alert("KI-Analyse bereit. Datenbank steht.");
                // Hier kommt der Groq-Call rein, sobald das Bild steht
            }
        };

        // Start
        initSystem();
    </script>
</body>
</html>
