<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NABY KEÏTA HUB V70</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --neon: #00f2ff; --gold: #d4af37; --bg: #050505; --card: rgba(255,255,255,0.03); }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        
        /* PROFESSIONELLER HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin: 20px 0 30px; border-left: 4px solid var(--neon); padding-left: 15px; }
        .header h1 { margin: 0; font-size: 24px; font-style: italic; text-transform: uppercase; letter-spacing: -1px; }
        .status-pill { background: var(--card); border: 1px solid rgba(212,175,55,0.2); padding: 8px 15px; border-radius: 1rem; text-align: right; }
        .status-led { font-size: 9px; font-weight: 900; color: #00ff41; text-transform: uppercase; }

        /* NAVIGATION */
        .nav-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 5px; margin-bottom: 20px; }
        .nav-btn { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; padding: 12px 0; color: #555; font-size: 8px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .nav-active { background: var(--gold) !important; color: #000 !important; border: none; box-shadow: 0 0 15px rgba(212,175,55,0.3); }

        /* SCANNER UNIT */
        .scouter { background: var(--card); border-radius: 2rem; padding: 15px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; text-align: center; }
        .viewport { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 1.5rem; overflow: hidden; position: relative; border: 1px solid #111; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--neon); top: 0; animation: scan 2s linear infinite; z-index: 10; display: none; box-shadow: 0 0 15px var(--neon); }
        @keyframes scan { from { top: 0%; } to { top: 100%; } }
        
        .action-btn { width: 100%; background: var(--neon); color: #000; border: none; padding: 18px; border-radius: 1.2rem; font-weight: 900; font-size: 13px; text-transform: uppercase; margin-top: 15px; cursor: pointer; }

        /* LISTS */
        .data-card { background: var(--card); border-radius: 2rem; padding: 20px; border: 1px solid rgba(255,255,255,0.03); min-height: 250px; }
        .list-header { color: var(--gold); font-size: 10px; font-weight: 900; text-transform: uppercase; border-bottom: 1px solid #111; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #0d0d0d; }
        .item-row b { font-style: italic; text-transform: uppercase; font-size: 13px; }
        .item-mhd { font-family: monospace; font-size: 10px; color: var(--gold); background: rgba(212,175,55,0.05); padding: 3px 8px; border-radius: 5px; border: 1px solid rgba(212,175,55,0.1); }
        
        .del-btn { color: #ff3e3e; font-size: 18px; padding-left: 10px; cursor: pointer; }

        /* SHOPPING LIST SPECIFIC */
        .shop-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #111; }
        .check-box { width: 20px; height: 20px; border: 2px solid var(--neon); border-radius: 5px; margin-right: 15px; }

        .console { font-family: monospace; font-size: 8px; color: #333; margin-top: 15px; text-align: left; height: 40px; overflow: hidden; }
    </style>
</head>
<body>

    <header class="header">
        <div>
            <h1>VITO <span style="color:var(--neon)">COMMAND</span></h1>
            <div style="font-size:8px; color:#444; letter-spacing:2px; text-transform:uppercase;">Bad Hersfeld | V70.0</div>
        </div>
        <div class="status-pill">
            <div id="led" class="status-led">Syncing ●</div>
            <div id="temp" style="font-weight:900; font-style:italic; font-size:18px;">4.0°C</div>
        </div>
    </header>

    <nav class="nav-tabs">
        <button onclick="st('FRIDGE')" id="t-FRIDGE" class="nav-btn nav-active">Kühl</button>
        <button onclick="st('FREEZER')" id="t-FREEZER" class="nav-btn">Frost</button>
        <button onclick="st('PANTRY')" id="t-PANTRY" class="nav-btn">Vorrat</button>
        <button onclick="st('SHOP')" id="t-SHOP" class="nav-btn">Einkauf</button>
    </nav>

    <div id="scanner-section" class="scouter">
        <div class="viewport">
            <div id="laser" class="scan-line"></div>
            <video id="v" autoplay playsinline muted style="display:none;"></video>
            <div id="p-text" style="padding-top:45%; color:#151515; font-weight:900; font-size:10px; letter-spacing:3px;">AI SCOUTER READY</div>
        </div>
        <button id="sBtn" class="action-btn">Einheit Scannen</button>
    </div>

    <div class="data-card">
        <div class="list-header">
            <span id="list-title">Bestand: Kühl</span>
            <span onclick="localStorage.removeItem('GRK'); location.reload();" style="font-size:7px; color:#333; text-decoration:underline;">RESET KEY</span>
        </div>
        <div id="l-content"></div>
    </div>

    <div id="c-log" class="console">> System-Check...</div>

    <script>
        const log = (m) => { const c = document.getElementById('c-log'); c.innerHTML = `> ${m}`; };
        const cfg = { apiKey: "AIzaSyDqqn39l6M8r-YC-R5utkwfG4En2OfUnpQ", authDomain: "gen-lang-client-0348637849.firebaseapp.com", projectId: "gen-lang-client-0348637849", storageBucket: "gen-lang-client-0348637849.firebasestorage.app", messagingSenderId: "1008937513696", appId: "1:1008937513696:web:1c0a2bc7792daf689a5685" };
        
        let GRK = localStorage.getItem('GRK'), mode = 'FRIDGE', stock = [];

        if(!GRK) { GRK = prompt("Groq Key erforderlich:"); if(GRK) localStorage.setItem('GRK', GRK.trim()); }

        firebase.initializeApp(cfg);
        const db = firebase.firestore();

        // REALTIME SYNC
        db.collection("inventory").orderBy("addedAt", "desc").onSnapshot(s => {
            stock = s.docs.map(d => ({id: d.id, ...d.data()}));
            document.getElementById('led').style.color = "#00ff41";
            document.getElementById('led').innerText = "Hub Live ●";
            render();
        });

        function render() {
            const cont = document.getElementById('l-content');
            const filtered = stock.filter(i => i.zone === mode);
            
            if (mode === 'SHOP') {
                document.getElementById('scanner-section').style.display = 'none';
                cont.innerHTML = filtered.map(i => `
                    <div class="shop-row">
                        <div class="check-box" onclick="removeItem('${i.id}')"></div>
                        <b style="text-transform:uppercase;">${i.name}</b>
                    </div>
                `).join('') || '<div style="text-align:center; padding:40px; color:#111; font-weight:900;">LISTE LEER</div>';
                return;
            }

            document.getElementById('scanner-section').style.display = 'block';
            cont.innerHTML = filtered.map(i => `
                <div class="item-row">
                    <div class="item-info"><b>${i.name}</b></div>
                    <div style="display:flex; align-items:center;">
                        <div class="item-mhd">${i.mhd || 'OFFEN'}</div>
                        <div class="del-btn" onclick="removeItem('${i.id}')">×</div>
                    </div>
                </div>
            `).join('') || '<div style="text-align:center; padding:40px; color:#111; font-weight:900;">ZONE LEER</div>';
        }

        async function removeItem(id) {
            if(confirm("Löschen?")) await db.collection("inventory").doc(id).delete();
        }

        // NAVIGATION
        window.st = (m) => {
            mode = m;
            document.getElementById('list-title').innerText = (m==='SHOP'?'Einkaufsliste':'Bestand: ' + m);
            ['FRIDGE','FREEZER','PANTRY','SHOP'].forEach(t => document.getElementById('t-'+t).classList.toggle('nav-active', t === m));
            render();
        };

        // SCANNER LOGIC
        const vid = document.getElementById('v'), sBtn = document.getElementById('sBtn');
        let cam = false;

        sBtn.onclick = async () => {
            if(!cam) {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                vid.srcObject = s; vid.style.display = "block";
                document.getElementById('p-text').style.display = "none";
                cam = true; sBtn.innerText = "Produkt Erfassen";
            } else {
                analyze();
            }
        };

        async function analyze() {
            sBtn.disabled = true; sBtn.innerText = "KI PRÜFT...";
            document.getElementById('laser').style.display = "block";
            const canv = document.createElement('canvas'); canv.width = 640; canv.height = 640;
            canv.getContext('2d').drawImage(vid, 0, 0, 640, 640);
            
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GRK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.2-11b-vision-preview",
                        messages: [{ role: "user", content: [
                            { type: "text", text: "JSON ONLY: { 'name': 'Produkt', 'mhd': 'Datum' }" },
                            { type: "image_url", image_url: { url: canv.toDataURL('image/jpeg', 0.6) } }
                        ]}]
                    })
                });
                const j = await res.json();
                const d = JSON.parse(j.choices[0].message.content.match(/\{.*\}/s)[0]);
                await db.collection("inventory").add({ ...d, zone: mode, addedAt: firebase.firestore.FieldValue.serverTimestamp() });
                log(`Erfasst: ${d.name}`);
                if(navigator.vibrate) navigator.vibrate(100);
            } catch(e) { log("KI-FEHLER!"); }
            
            sBtn.disabled = false; sBtn.innerText = "Produkt Erfassen";
            document.getElementById('laser').style.display = "none";
        }
    </script>
</body>
</html>
