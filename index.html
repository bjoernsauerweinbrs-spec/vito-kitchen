<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NABY KEÏTA COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .neon-text { color: #00f2ff; text-shadow: 0 0 15px rgba(0,242,255,0.7); }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .zone-active { background: #d4af37 !important; color: #000 !important; font-weight: 900; }
    </style>
</head>
<body class="p-4 pb-32">

    <header class="flex justify-between items-start mb-6 border-l-4 border-[#00f2ff] pl-4">
        <div>
            <h1 class="text-2xl font-black italic uppercase leading-none tracking-tighter">NABY KEÏTA <br><span class="neon-text">COMMAND</span></h1>
            <p class="text-[9px] text-gray-500 font-bold uppercase mt-1">BAD HERSFELD | FINAL BREAKTHROUGH</p>
        </div>
        <div class="text-right glass p-3 rounded-2xl">
            <div id="dbStatus" class="text-[9px] font-black uppercase text-green-500">Online ●</div>
            <div class="text-xl font-black italic">4.0°C</div>
        </div>
    </header>

    <div class="flex gap-2 mb-6">
        <button onclick="setZone('FRIDGE')" id="z-FRIDGE" class="flex-1 py-4 bg-[#111] rounded-2xl text-[10px] font-black zone-active">🧊 KÜHL</button>
        <button onclick="setZone('FREEZER')" id="z-FREEZER" class="flex-1 py-4 bg-[#111] rounded-2xl text-[10px] font-black text-gray-600">❄️ FROST</button>
        <button onclick="setZone('PANTRY')" id="z-PANTRY" class="flex-1 py-4 bg-[#111] rounded-2xl text-[10px] font-black text-gray-600">📦 VORRAT</button>
    </div>

    <div class="glass p-5 rounded-[2.5rem] mb-6">
        <div class="relative w-full aspect-video bg-black rounded-3xl overflow-hidden flex items-center justify-center">
            <video id="v" autoplay playsinline muted class="hidden w-full h-full object-cover"></video>
            <canvas id="canvas" class="hidden"></canvas>
            <div id="cp" class="text-gray-700 font-black text-[10px] uppercase">VITO SCOUTER READY</div>
        </div>
        <button id="sBtn" class="w-full py-5 mt-5 bg-[#00f2ff] text-black font-black rounded-3xl uppercase text-sm shadow-xl active:scale-95">Scan Starten</button>
    </div>

    <div class="glass p-6 rounded-[2.5rem]">
        <div class="flex justify-between items-center mb-6">
            <h3 id="zT" class="text-[11px] font-black text-[#d4af37] uppercase italic">Inventar</h3>
            <button onclick="localStorage.removeItem('GK'); location.reload();" class="text-[8px] border border-red-500 text-red-500 px-3 py-1.5 rounded-full uppercase">Reset Key</button>
        </div>
        <div id="invList" class="space-y-4 text-xs italic text-gray-400">Sync läuft...</div>
    </div>

    <script>
        const fbConfig = { apiKey: "AIzaSyDqqn39l6M8r-YC-R5utkwfG4En2OfUnpQ", authDomain: "gen-lang-client-0348637849.firebaseapp.com", projectId: "gen-lang-client-0348637849", storageBucket: "gen-lang-client-0348637849.firebasestorage.app", messagingSenderId: "1008937513696", appId: "1:1008937513696:web:1c0a2bc7792daf689a5685" };
        
        let GK = localStorage.getItem('GK');
        if (!GK) {
            GK = prompt("TACTICAL LOGIN: Bitte den Key für 'gerd' (Endung wtkl) eingeben:");
            if (GK) localStorage.setItem('GK', GK.trim());
        }

        firebase.initializeApp(fbConfig);
        const db = firebase.firestore();
        let curZ = 'FRIDGE', camOn = false, allStock = [];

        function sync() {
            db.collection("inventory").orderBy("addedAt", "desc").onSnapshot(snap => {
                allStock = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render();
            });
        }

        function render() {
            const list = allStock.filter(i => i.zone === curZ);
            document.getElementById('invList').innerHTML = list.map(i => `
                <div class="flex justify-between items-center py-3 border-b border-white/5">
                    <span class="font-black text-white uppercase italic text-xs">${i.name}</span>
                    <span class="text-[9px] text-gray-500 font-mono bg-white/5 px-2 py-1 rounded">${i.mhd || 'OFFEN'}</span>
                </div>
            `).join('') || '<p class="text-center py-8 text-gray-800 font-black text-[9px]">LEER</p>';
        }

        const video = document.getElementById('v'), sBtn = document.getElementById('sBtn');

        sBtn.addEventListener('click', async () => {
            if (!camOn) {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = s; video.classList.remove('hidden');
                document.getElementById('cp').classList.add('hidden');
                camOn = true;
            } else {
                analyze();
            }
        });

        async function analyze() {
            sBtn.disabled = true; sBtn.innerText = "PRÜFE...";
            const canvas = document.getElementById('canvas');
            canvas.width = 640; canvas.height = 480;
            canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
            const b64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
            
            try {
                // ABSOLUT STABILER PFAD (V1)
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${GK}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "JSON ONLY: { 'name': '...', 'mhd': '...' }" }, { inline_data: { mime_type: "image/jpeg", data: b64 } }] }] })
                });
                const d = await res.json();
                
                if (d.error) {
                    alert("GOOGLE-MELDUNG: " + d.error.message);
                } else {
                    const raw = d.candidates[0].content.parts[0].text;
                    const data = JSON.parse(raw.substring(raw.indexOf('{'), raw.lastIndexOf('}') + 1));
                    await db.collection("inventory").add({ ...data, zone: curZ, addedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    window.speechSynthesis.speak(new SpeechSynthesisUtterance("Erfasst: " + data.name));
                }
            } catch (e) { alert("Fehler: " + e.message); }
            sBtn.disabled = false; sBtn.innerText = "Scan Starten";
        }

        window.setZone = (z) => {
            curZ = z;
            ['FRIDGE','FREEZER','PANTRY'].forEach(id => document.getElementById('z-'+id).classList.toggle('zone-active', id === z));
            render();
        };

        sync();
    </script>
</body>
</html>
