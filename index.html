<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VITO MASTER V82 | DEBUG</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --neon: #00f2ff; --gold: #d4af37; --bg: #050505; --card: rgba(255,255,255,0.03); }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        
        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin: 15px 0 25px; border-left: 4px solid var(--neon); padding-left: 15px; }
        .header h1 { margin: 0; font-size: 22px; font-style: italic; text-transform: uppercase; letter-spacing: -1px; }
        .status-led { font-size: 9px; font-weight: 900; color: #ff3e3e; text-transform: uppercase; }

        /* NAV */
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; gap: 4px; margin-bottom: 20px; }
        .nav-btn { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 12px 0; color: #444; font-size: 7px; font-weight: bold; text-transform: uppercase; }
        .nav-active { background: var(--neon) !important; color: #000 !important; font-weight: 900; }

        /* SCOUTER */
        .scouter { background: var(--card); border-radius: 2rem; padding: 15px; border: 1px solid rgba(0,242,255,0.1); margin-bottom: 20px; position: relative; }
        .viewport { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 1.5rem; overflow: hidden; position: relative; border: 1px solid #111; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .laser { position: absolute; width: 100%; height: 2px; background: var(--neon); top: 0; animation: scan 2s linear infinite; z-index: 10; display: none; box-shadow: 0 0 15px var(--neon); }
        @keyframes scan { from { top: 0%; } to { top: 100%; } }
        
        .action-btn { width: 100%; background: var(--neon); color: #000; border: none; padding: 18px; border-radius: 1.2rem; font-weight: 900; font-size: 13px; text-transform: uppercase; margin-top: 15px; cursor: pointer; }

        /* CONTENT */
        .card { background: var(--card); border-radius: 2rem; padding: 20px; border: 1px solid rgba(255,255,255,0.03); min-height: 200px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #0d0d0d; }
        .row b { font-style: italic; text-transform: uppercase; font-size: 13px; }
        
        /* TERMINAL / DEBUG */
        .terminal { background: #000; border: 1px solid #222; border-radius: 1rem; padding: 10px; font-family: monospace; font-size: 9px; color: #00f2ff; height: 100px; overflow-y: auto; margin-top: 20px; }
    </style>
</head>
<body>

    <header class="header">
        <div>
            <h1 style="font-style: italic;">NABY KEÏTA <span style="color:var(--neon)">HUB</span></h1>
            <div style="font-size:7px; color:#444; letter-spacing:3px; text-transform:uppercase;">Diagnostic Unit V82.0</div>
        </div>
        <div id="led" class="status-led">OFFLINE ●</div>
    </header>

    <nav class="nav-grid">
        <button onclick="sm('FRIDGE')" id="t-FRIDGE" class="nav-btn nav-active">Kühl</button>
        <button onclick="sm('FREEZER')" id="t-FREEZER" class="nav-btn">Frost</button>
        <button onclick="sm('PANTRY')" id="t-PANTRY" class="nav-btn">Vorrat</button>
        <button onclick="sm('SHOP')" id="t-SHOP" class="nav-btn">Kauf</button>
        <button onclick="sm('CHEF')" id="t-CHEF" class="nav-btn">Chef</button>
    </nav>

    <div class="scouter">
        <div class="viewport">
            <div id="laser" class="laser"></div>
            <video id="v" autoplay playsinline muted style="display:none;"></video>
            <div id="p-text" style="padding: 40% 10px; text-align:center; color:#111; font-weight:900; font-size:10px; letter-spacing:4px;">SYSTEM BEREIT</div>
        </div>
        <button id="sBtn" class="action-btn">Scan auslösen</button>
    </div>

    <div class="card">
        <div id="l-content"></div>
    </div>

    <div class="terminal" id="term">> System-Check Bad Hersfeld...</div>

    <script>
        const term = document.getElementById('term');
        function log(m) { term.innerHTML += `<br>> ${m}`; term.scrollTop = term.scrollHeight; }

        const cfg = { apiKey: "AIzaSyDqqn39l6M8r-YC-R5utkwfG4En2OfUnpQ", authDomain: "gen-lang-client-0348637849.firebaseapp.com", projectId: "gen-lang-client-0348637849", storageBucket: "gen-lang-client-0348637849.firebasestorage.app", messagingSenderId: "1008937513696", appId: "1:1008937513696:web:1c0a2bc7792daf689a5685" };
        
        let GRK = localStorage.getItem('GRK'), curM = 'FRIDGE', stock = [];

        if(!GRK || GRK.length < 10) { 
            GRK = prompt("Groq API Key (gsk_...) eingeben:"); 
            if(GRK) localStorage.setItem('GRK', GRK.trim()); 
        }

        firebase.initializeApp(cfg);
        const db = firebase.firestore();

        db.collection("inventory").orderBy("addedAt", "desc").onSnapshot(s => {
            stock = s.docs.map(d => ({id: d.id, ...d.data()}));
            document.getElementById('led').style.color = "#00ff41";
            document.getElementById('led').innerText = "LIVE ●";
            render();
        });

        function render() {
            const cont = document.getElementById('l-content');
            const filtered = stock.filter(i => i.zone === curM);
            cont.innerHTML = filtered.map(i => `<div class="row"><b>${i.name}</b><span>${i.mhd || ''}</span></div>`).join('') || '<div style="text-align:center; padding:30px; color:#111; font-size:10px;">ZONE LEER</div>';
        }

        window.sm = (m) => {
            curM = m; render();
            ['FRIDGE','FREEZER','PANTRY','SHOP','CHEF'].forEach(t => document.getElementById('t-'+t).classList.toggle('nav-active', t === m));
        };

        const vid = document.getElementById('v'), sBtn = document.getElementById('sBtn');
        let cam = false;

        sBtn.onclick = async () => {
            if(!cam) {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    vid.srcObject = s; vid.style.display = "block";
                    document.getElementById('p-text').style.display = "none";
                    cam = true; sBtn.innerText = "JETZT ANALYSIEREN";
                    log("Kamera gestartet.");
                } catch(e) { log("Kamera-Fehler: " + e.message); }
            } else {
                analyze();
            }
        };

        async function analyze() {
            sBtn.disabled = true; sBtn.innerText = "KI ARBEITET...";
            document.getElementById('laser').style.display = "block";
            
            const canv = document.createElement('canvas'); 
            canv.width = 600; canv.height = 600;
            canv.getContext('2d').drawImage(vid, 0, 0, 600, 600);
            const imgBase64 = canv.toDataURL('image/jpeg', 0.5);

            log("Sende Daten an Groq Cloud...");

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GRK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.2-11b-vision-preview",
                        messages: [{ role: "user", content: [
                            { type: "text", text: "Analysiere alle Produkte. Antworte NUR als JSON-Array: [ { 'name': '...', 'mhd': '...' } ]" },
                            { type: "image_url", image_url: { url: imgBase64 } }
                        ]}],
                        temperature: 0.1
                    })
                });

                if(!response.ok) {
                    const errData = await response.json();
                    throw new Error(`API-ERROR: ${errData.error.message}`);
                }

                const json = await response.json();
                const content = json.choices[0].message.content;
                const items = JSON.parse(content.match(/\[.*\]/s)[0]);

                for(let item of items) {
                    await db.collection("inventory").add({ ...item, zone: curM, addedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    log(`ERFOLG: ${item.name} erkannt.`);
                    window.speechSynthesis.speak(new SpeechSynthesisUtterance("Check: " + item.name));
                }
                
            } catch(e) {
                log("FEHLER: " + e.message);
                alert("Scan fehlgeschlagen. Details im Terminal unten.");
            }

            sBtn.disabled = false; sBtn.innerText = "JETZT ANALYSIEREN";
            document.getElementById('laser').style.display = "none";
        }
    </script>
</body>
</html>
