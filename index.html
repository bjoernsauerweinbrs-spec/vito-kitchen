<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VITO V58 GHOST BUSTER</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        /* KEIN EXTERN-CSS: ALLES HIER DRIN */
        body { background: #000; color: #00f2ff; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .vito-header { border-left: 5px solid #00f2ff; padding: 10px; text-align: left; margin-bottom: 20px; background: rgba(0,242,255,0.05); }
        .vito-card { border: 1px solid #333; border-radius: 20px; padding: 15px; background: #0a0a0a; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { width: 100%; padding: 18px; background: #00f2ff; color: #000; border: none; border-radius: 12px; font-weight: 900; font-size: 14px; text-transform: uppercase; cursor: pointer; }
        .btn:active { background: #008891; }
        .log-box { font-family: monospace; font-size: 9px; color: #444; text-align: left; background: #050505; padding: 10px; border-radius: 10px; height: 80px; overflow-y: scroll; border: 1px solid #111; }
        .inv-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #111; font-size: 13px; text-transform: uppercase; font-style: italic; }
        .mhd-label { color: #d4af37; font-weight: bold; }
        #v { width: 100%; border-radius: 15px; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="vito-header">
        <h1 style="margin:0; font-style: italic; letter-spacing: -1px;">VITO <span style="color:#fff">COMMAND</span></h1>
        <div style="font-size: 9px; font-weight: bold; opacity: 0.5;">BAD HERSFELD | BUILD V58.0-ELITE</div>
    </div>

    <div class="vito-card">
        <div id="cam-placeholder" style="padding: 40px 0; color: #222; font-weight: 900; font-size: 10px; letter-spacing: 3px;">SCOUTER STANDBY</div>
        <video id="v" autoplay playsinline muted></video>
        <canvas id="c" style="display:none;"></canvas>
        <button id="sBtn" class="btn">Einheit Erfassen</button>
    </div>

    <div class="vito-card" style="text-align: left;">
        <div style="color: #d4af37; font-size: 11px; font-weight: 900; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;">Bestand Kühlzentrale</div>
        <div id="inv-list" style="color: #888; font-size: 11px;">Synchronisiere mit Bad Hersfeld...</div>
    </div>

    <div class="log-box" id="vito-log">
        [12:47] System-Start eingeleitet...<br>
    </div>

    <button onclick="localStorage.removeItem('GRK'); location.reload();" style="background:none; border:none; color: #333; font-size: 8px; margin-top: 20px; text-decoration: underline;">API-KEY RESET</button>

    <script>
        const vLog = (m) => { document.getElementById('vito-log').innerHTML += `> ${m}<br>`; console.log(m); };
        
        const fbCfg = { apiKey: "AIzaSyDqqn39l6M8r-YC-R5utkwfG4En2OfUnpQ", authDomain: "gen-lang-client-0348637849.firebaseapp.com", projectId: "gen-lang-client-0348637849", storageBucket: "gen-lang-client-0348637849.firebasestorage.app", messagingSenderId: "1008937513696", appId: "1:1008937513696:web:1c0a2bc7792daf689a5685" };

        let GRK = localStorage.getItem('GRK');
        if(!GRK) {
            vLog("Warte auf Key-Eingabe...");
            GRK = prompt("VITO MASTER KEY (Groq) erforderlich:");
            if(GRK) localStorage.setItem('GRK', GRK.trim());
        }

        try {
            firebase.initializeApp(fbCfg);
            const db = firebase.firestore();
            vLog("Firebase aktiv.");

            db.collection("inventory").orderBy("addedAt", "desc").onSnapshot(snap => {
                const items = snap.docs.map(d => d.data());
                vLog(`${items.length} Einheiten synchronisiert.`);
                document.getElementById('inv-list').innerHTML = items.map(i => `
                    <div class="inv-item">
                        <span>${i.name}</span>
                        <span class="mhd-label">${i.mhd || 'OFFEN'}</span>
                    </div>
                `).join('') || "Zentrale leer.";
            }, err => vLog("DB-Fehler: " + err.message));

        } catch (e) { vLog("Fehler: " + e.message); }

        const vid = document.getElementById('v'), sBtn = document.getElementById('sBtn');
        let camOn = false;

        sBtn.onclick = async () => {
            if(!camOn) {
                vLog("Kamera-Anfrage...");
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    vid.srcObject = s; vid.style.display = "block";
                    document.getElementById('cam-placeholder').style.display = "none";
                    camOn = true; sBtn.innerText = "Scan auslösen";
                    vLog("Kamera bereit.");
                } catch(e) { vLog("Kamera-Fehler: " + e.message); }
            } else {
                analyze();
            }
        };

        async function analyze() {
            sBtn.disabled = true; sBtn.innerText = "KI ANALYSE...";
            vLog("Sende Bild an Groq...");
            const can = document.getElementById('c'); can.width = 640; can.height = 640;
            can.getContext('2d').drawImage(vid, 0, 0, 640, 640);
            
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GRK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.2-11b-vision-preview",
                        messages: [{ role: "user", content: [
                            { type: "text", text: "JSON ONLY: { 'name': 'Produkt', 'mhd': 'Datum' }" },
                            { type: "image_url", image_url: { url: can.toDataURL('image/jpeg', 0.6) } }
                        ]}]
                    })
                });
                const j = await res.json();
                const d = JSON.parse(j.choices[0].message.content.match(/\{.*\}/s)[0]);
                vLog(`Erfasst: ${d.name}`);
                await firebase.firestore().collection("inventory").add({ ...d, zone: "FRIDGE", addedAt: firebase.firestore.FieldValue.serverTimestamp() });
                if(navigator.vibrate) navigator.vibrate(100);
            } catch(e) { vLog("KI-Fehler: " + e.message); }
            sBtn.disabled = false; sBtn.innerText = "Scan auslösen";
        }
    </script>
</body>
</html>
