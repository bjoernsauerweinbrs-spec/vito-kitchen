<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GERD 2.0 | THE LEGACY</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --gold-l: #f9f295; --gold-d: #b88a44; --neon: #00f2ff; --bg: #020202; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 15px; overflow-x: hidden; background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #020202 100%); }
        
        /* GOLDEN LEGACY BRANDING */
        .legacy-branding { text-align: center; margin: 30px 0; }
        .gold-text { font-size: 34px; font-weight: 900; font-style: italic; text-transform: uppercase; background: linear-gradient(to bottom, var(--gold-l) 0%, var(--gold) 40%, var(--gold-d) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px rgba(212,175,55,0.4)); letter-spacing: -1px; }
        
        /* TACTICAL INTERFACE */
        .hud-nav { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 25px; }
        .hud-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,55,0.2); border-radius: 12px; padding: 15px 0; text-align: center; cursor: pointer; transition: 0.3s; }
        .hud-btn.active { background: var(--gold); border-color: var(--gold-l); box-shadow: 0 0 20px rgba(212,175,55,0.4); }
        .hud-btn.active span { color: #000; font-weight: 900; }
        .hud-btn span { font-size: 8px; text-transform: uppercase; display: block; margin-top: 5px; color: #555; }

        /* SCOUTER UNIT */
        .scouter { background: rgba(255,255,255,0.01); border: 1px solid rgba(212,175,55,0.1); border-radius: 40px; padding: 15px; position: relative; transition: all 0.4s; }
        .scouter.success { border-color: var(--gold); box-shadow: 0 0 40px var(--gold); }
        .viewport { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 30px; overflow: hidden; position: relative; border: 1px solid #111; }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .scan-laser { position: absolute; width: 100%; height: 2px; background: var(--neon); top: 0; animation: scan 2s linear infinite; box-shadow: 0 0 15px var(--neon); z-index: 100; display: none; }
        @keyframes scan { from { top: 0%; } to { top: 100%; } }

        .fire-btn { width: 100%; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-d) 100%); border: none; padding: 22px; border-radius: 20px; color: #000; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-top: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); cursor: pointer; }

        /* ITEM STREAM */
        .item-card { background: rgba(255,255,255,0.02); border-radius: 25px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); margin-top: 25px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .item-row b { color: var(--gold); font-style: italic; text-transform: uppercase; font-size: 14px; }
        .item-row .mhd { font-family: monospace; font-size: 10px; color: var(--neon); opacity: 0.7; }

        /* ANALYTICS CONSOLE */
        .console { background: #000; border: 1px solid #222; border-radius: 15px; padding: 12px; font-family: monospace; font-size: 9px; color: var(--neon); height: 80px; overflow-y: auto; margin-top: 20px; }
        .c-err { color: #ff3e3e; font-weight: bold; }
    </style>
</head>
<body>

    <div class="legacy-branding">
        <div class="gold-text">Gerd 2.0 – The Legacy</div>
        <div style="font-size: 7px; color: var(--neon); letter-spacing: 4px; text-transform: uppercase; margin-top: 8px;">Tactical Inventory Hub</div>
    </div>

    <nav class="hud-nav">
        <div onclick="sm('FRIDGE')" id="t-FRIDGE" class="hud-btn active">❄️<span>Kühl</span></div>
        <div onclick="sm('FREEZER')" id="t-FREEZER" class="hud-btn">🧊<span>Frost</span></div>
        <div onclick="sm('PANTRY')" id="t-PANTRY" class="hud-btn">📦<span>Vorrat</span></div>
        <div onclick="sm('SHOP')" id="t-SHOP" class="hud-btn">🛒<span>Kauf</span></div>
        <div onclick="sm('CHEF')" id="t-CHEF" class="hud-btn">👨‍🍳<span>Chef</span></div>
    </nav>

    <div id="scouter-ui" class="scouter">
        <div class="viewport">
            <div id="laser" class="scan-laser"></div>
            <video id="v" autoplay playsinline muted style="display:none;"></video>
            <div id="p-text" style="padding-top:45%; text-align:center; color:#151515; font-weight:900; font-size:10px; letter-spacing:4px;">SCOUTER STANDBY</div>
        </div>
        <button id="sBtn" class="fire-btn">Start Multi-Scan</button>
    </div>

    <div class="item-card">
        <div id="l-content"></div>
        <div id="intel-zone" style="display:none;">
            <button onclick="runIntel()" class="fire-btn" style="background:var(--neon);">Execute Strategy</button>
            <div id="intel-out" style="margin-top:15px; font-size:11px; color:var(--neon); font-style:italic;"></div>
        </div>
    </div>

    <div class="console" id="terminal">> System initialisiert...</div>

    <div style="text-align:center; margin-top:25px;">
        <span onclick="localStorage.removeItem('GRK'); location.reload();" style="color:#222; font-size:9px; text-decoration:underline;">RESET COMMAND KEY</span>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        function log(m, isErr=false) { 
            terminal.innerHTML += `<br><span class="${isErr?'c-err':''}">> ${m}</span>`; 
            terminal.scrollTop = terminal.scrollHeight; 
        }

        const cfg = { apiKey: "AIzaSyDqqn39l6M8r-YC-R5utkwfG4En2OfUnpQ", authDomain: "gen-lang-client-0348637849.firebaseapp.com", projectId: "gen-lang-client-0348637849", storageBucket: "gen-lang-client-0348637849.firebasestorage.app", messagingSenderId: "1008937513696", appId: "1:1008937513696:web:1c0a2bc7792daf689a5685" };
        let GRK = localStorage.getItem('GRK'), curM = 'FRIDGE', stock = [];

        if(!GRK) { GRK = prompt("VITO KEY (Groq) erforderlich:"); if(GRK) localStorage.setItem('GRK', GRK.trim()); }

        firebase.initializeApp(cfg);
        const db = firebase.firestore();

        db.collection("inventory").orderBy("addedAt", "desc").onSnapshot(s => {
            stock = s.docs.map(d => ({id: d.id, ...d.data()}));
            log("Bestand geladen.");
            render();
        });

        function render() {
            const cont = document.getElementById('l-content');
            const filtered = stock.filter(i => i.zone === curM);
            document.getElementById('scouter-ui').style.display = (curM === 'CHEF' ? 'none' : 'block');
            document.getElementById('intel-zone').style.display = (curM === 'SHOP' || curM === 'CHEF' ? 'block' : 'none');
            
            cont.innerHTML = filtered.map(i => `
                <div class="item-row">
                    <b>${i.name}</b>
                    <div style="text-align:right;">
                        <span class="mhd">${i.mhd || 'INFO'}</span>
                        <span onclick="del('${i.id}')" style="color:#ff3e3e; margin-left:15px; font-size:18px;">×</span>
                    </div>
                </div>
            `).join('') || '<div style="text-align:center; padding:40px; color:#111; font-weight:900;">ZONE LEER</div>';
        }

        async function del(id) { if(confirm("Löschen?")) await db.collection("inventory").doc(id).delete(); }

        window.sm = (m) => {
            curM = m; document.getElementById('intel-out').innerText = '';
            ['FRIDGE','FREEZER','PANTRY','SHOP','CHEF'].forEach(t => document.getElementById('t-'+t).classList.toggle('active', t === m));
            render();
        };

        const vid = document.getElementById('v'), sBtn = document.getElementById('sBtn'), laser = document.getElementById('laser');
        let camActive = false;

        sBtn.onclick = async () => {
            if(!camActive) {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    vid.srcObject = s; vid.style.display = "block";
                    document.getElementById('p-text').style.display = "none";
                    camActive = true; sBtn.innerText = "Execute Scan";
                    log("Kamera bereit.");
                } catch(e) { log("Kamera-Fehler: " + e.message, true); }
            } else {
                analyze();
            }
        };

        async function analyze() {
            sBtn.disabled = true; sBtn.innerText = "Analyzing...";
            laser.style.display = "block";
            
            const canv = document.createElement('canvas'); 
            canv.width = 700; canv.height = 700;
            canv.getContext('2d').drawImage(vid, 0, 0, 700, 700);
            
            try {
                log("Verbindung zu Groq...");
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GRK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.2-11b-vision",
                        messages: [{ role: "user", content: [
                            { type: "text", text: "Multi-Scan: Identify all products. Output ONLY valid JSON array: [ { 'name': '...', 'mhd': '...' } ]" },
                            { type: "image_url", image_url: { url: canv.toDataURL('image/jpeg', 0.5) } }
                        ]}],
                        temperature: 0.1
                    })
                });

                if(!res.ok) {
                    const errorData = await res.json();
                    throw new Error(errorData.error.message || "API unbekannter Fehler");
                }

                const json = await res.json();
                const content = json.choices[0].message.content;
                const items = JSON.parse(content.match(/\[.*\]/s)[0]);
                
                for(let item of items) {
                    await db.collection("inventory").add({ ...item, zone: curM, addedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    log(`ERFOLG: ${item.name}`);
                    window.speechSynthesis.speak(new SpeechSynthesisUtterance("Check: " + item.name));
                }
                
                document.getElementById('scouter-ui').classList.add('success');
                setTimeout(() => document.getElementById('scouter-ui').classList.remove('success'), 600);
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);

            } catch(e) {
                log("KI-FEHLER: " + e.message, true);
                alert("Scan fehlgeschlagen: " + e.message);
            }
            
            sBtn.disabled = false; sBtn.innerText = "Execute Scan";
            laser.style.display = "none";
        }

        async function runIntel() {
            const out = document.getElementById('intel-out');
            out.innerText = "Calculating Tactical Response...";
            const inv = stock.map(i => i.name).join(", ");
            const p = curM === 'CHEF' ? `Bestand: ${inv}. Schlage 5-Sterne Rezept vor.` : `Kaufliste: ${stock.filter(i=>i.zone==='SHOP').map(i=>i.name)}. Wo in Bad Hersfeld ist es günstig?`;
            
            try {
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GRK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: p }] })
                });
                const j = await r.json();
                out.innerText = j.choices[0].message.content;
            } catch(e) { out.innerText = "Sync Error."; }
        }
    </script>
</body>
</html>
