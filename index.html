<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VITO KITCHEN COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .neon-text { color: #00f2ff; text-shadow: 0 0 10px rgba(0,242,255,0.5); }
        .status-blink { animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="p-4 bg-black text-white">

    <header class="flex justify-between items-start mb-6">
        <div>
            <h1 class="text-2xl font-black tracking-tighter italic">VITO <span class="neon-text">COMMAND</span></h1>
            <p class="text-[9px] text-gray-500 font-bold uppercase">Bad Hersfeld | Gerd 2.0 Legacy</p>
        </div>
        <div class="text-right bg-[#111] p-3 rounded-2xl border border-gray-800">
            <div class="text-[10px] font-bold text-[#00ff41] status-blink uppercase">Croque Active ●</div>
            <div id="temp" class="text-lg font-bold">4.0°C</div>
        </div>
    </header>

    <div class="bg-[#111] p-6 rounded-[2rem] border border-[#00f2ff]/20 mb-4 text-center">
        <button id="vBtn" class="w-16 h-16 bg-[#222] rounded-full text-2xl border border-gray-800 active:scale-95">🎙️</button>
        <p id="aiStatus" class="text-[10px] text-gray-600 mt-2 uppercase tracking-widest">Assistent Standby</p>
    </div>

    <div class="bg-[#111] p-5 rounded-[2rem] border border-gray-800 mb-4">
        <div class="relative w-full aspect-video bg-black rounded-2xl overflow-hidden border border-gray-900">
            <video id="v" autoplay playsinline muted class="hidden w-full h-full object-cover"></video>
            <canvas id="c" class="hidden"></canvas>
            <div id="cp" class="flex items-center justify-center h-full text-[10px] text-gray-700 font-bold uppercase">Scouter bereit</div>
        </div>
        <button id="sBtn" class="w-full py-4 mt-4 bg-[#00f2ff] text-black font-black rounded-2xl uppercase shadow-lg">Scanner aktivieren</button>
    </div>

    <div id="res" class="hidden bg-[#d4af37]/10 p-4 rounded-xl border border-[#d4af37]/30 mb-4 text-sm italic text-center">
        Analysiere Produkt...
    </div>

    <div class="bg-[#111] p-5 rounded-[2rem] border border-gray-800">
        <h3 class="text-[10px] font-bold text-[#d4af37] uppercase mb-3">Inventar / Kühl</h3>
        <div id="invList" class="text-xs text-gray-500 space-y-2">
            Warte auf ersten Scan...
        </div>
    </div>

    <script>
        // --- DEINE CONFIG (WICHTIG!) ---
        const CROQ_KEY = "DEIN_GROQ_KEY_HIER"; 
        
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const sBtn = document.getElementById('sBtn');
        const resDiv = document.getElementById('res');
        const invList = document.getElementById('invList');
        let isCamOn = false;

        // 1. Kamera Start/Capture
        sBtn.addEventListener('click', async () => {
            if (!isCamOn) {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    video.srcObject = s;
                    video.classList.remove('hidden');
                    document.getElementById('cp').classList.add('hidden');
                    sBtn.innerText = "Produkt analysieren";
                    isCamOn = true;
                } catch (e) { alert("Kamera-Zugriff verweigert."); }
            } else {
                analyze();
            }
        });

        // 2. Groq KI Analyse
        async function analyze() {
            resDiv.classList.remove('hidden');
            resDiv.innerText = "VITO analysiert...";
            
            // Frame einfangen
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg');

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${CROQ_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.2-11b-vision-preview",
                        messages: [{ role: "user", content: [
                            { type: "text", text: "Identifiziere das Produkt und MHD. Rückgabe NUR JSON: { 'name': '...', 'mhd': '...' }" },
                            { type: "image_url", image_url: { url: base64 } }
                        ]}],
                        response_format: { type: "json_object" }
                    })
                });
                
                const data = await response.json();
                const product = JSON.parse(data.choices[0].message.content);
                
                resDiv.innerHTML = `<span class="text-white font-bold">${product.name}</span><br>MHD: ${product.mhd}`;
                invList.innerHTML = `<div class="flex justify-between py-2 border-b border-gray-900 text-white"><span>${product.name}</span><span>${product.mhd}</span></div>` + invList.innerHTML;
                
                if(navigator.vibrate) navigator.vibrate(100);
            } catch (e) {
                resDiv.innerText = "KI-Verbindung gestört.";
            }
        }

        // Voice Nadine
        document.getElementById('vBtn').addEventListener('click', () => {
            const t = "Nadine, wir haben die Daten empfangen. Soll ich das auf die Einkaufsliste setzen?";
            const s = new SpeechSynthesisUtterance(t);
            s.lang = 'de-DE';
            window.speechSynthesis.speak(s);
        });
    </script>
</body>
</html>
