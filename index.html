<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NABY KEÏTA COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .neon-text { color: #00f2ff; text-shadow: 0 0 15px rgba(0,242,255,0.7); }
        .gold-accent { color: #d4af37; }
        .status-blink { animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .zone-btn-active { background: #d4af37 !important; color: #000 !important; font-weight: 900; box-shadow: 0 0 20px rgba(212,175,55,0.4); }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        canvas { display: none; }
    </style>
</head>
<body class="p-4 pb-32">

    <header class="flex justify-between items-start mb-6 border-l-4 border-[#00f2ff] pl-4">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter uppercase leading-none">NABY KEÏTA <br><span class="neon-text">COMMAND</span></h1>
            <p class="text-[9px] text-gray-600 font-bold tracking-[0.3em] mt-1">BAD HERSFELD | TACTICAL HUB</p>
        </div>
        <div class="text-right glass p-3 rounded-2xl border border-[#d4af37]/30">
            <div id="dbStatus" class="text-[9px] font-black uppercase text-red-500 status-blink">Offline ●</div>
            <div id="liveTemp" class="text-xl font-black italic text-white">4.0°C</div>
        </div>
    </header>

    <section class="glass p-5 rounded-[2.5rem] mb-6 border border-[#00f2ff]/20">
        <div class="flex items-center gap-4">
            <button id="vBtn" class="w-16 h-16 bg-[#111] rounded-full text-2xl flex items-center justify-center border border-gray-800 active:scale-95 shadow-lg shadow-[#00f2ff]/20">🎙️</button>
            <div class="flex-1">
                <h3 class="text-xs font-black neon-text uppercase tracking-widest">Kitchen Chef</h3>
                <p id="aiMsg" class="text-[10px] text-gray-500 italic">"Nadine, was kochen wir heute?"</p>
            </div>
        </div>
        <div id="recipeBox" class="hidden mt-4 p-5 bg-black/70 rounded-3xl border border-gray-900 text-xs">
            <p class="gold-accent font-black uppercase mb-1 text-[9px]">Vorschlag:</p>
            <div id="recipeText" class="text-white italic leading-relaxed"></div>
        </div>
    </section>

    <div class="flex gap-2 mb-6">
        <button onclick="setZone('FRIDGE')" id="z-FRIDGE" class="flex-1 py-4 bg-[#111] rounded-2xl text-[9px] font-black uppercase zone-btn-active">🧊 Kühl</button>
        <button onclick="setZone('FREEZER')" id="z-FREEZER" class="flex-1 py-4 bg-[#111] rounded-2xl text-[9px] font-black uppercase text-gray-600">❄️ Frost</button>
        <button onclick="setZone('PANTRY')" id="z-PANTRY" class="flex-1 py-4 bg-[#111] rounded-2xl text-[9px] font-black uppercase text-gray-600">📦 Vorrat</button>
    </div>

    <div class="glass p-5 rounded-[2.5rem] mb-6">
        <div class="relative w-full aspect-video bg-black rounded-3xl overflow-hidden border border-gray-900 flex items-center justify-center">
            <video id="v" autoplay playsinline muted class="hidden w-full h-full object-cover"></video>
            <canvas id="canvas"></canvas>
            <div id="cp" class="text-center text-gray-700 font-black text-[10px] uppercase tracking-widest">Scouter Ready</div>
        </div>
        <button id="sBtn" class="w-full py-5 mt-5 bg-[#00f2ff] text-black font-black rounded-3xl uppercase text-sm shadow-xl active:scale-95 transition-all">Analyse Starten</button>
    </div>

    <section class="glass p-5 rounded-[2.5rem] mb-6 border border-[#d4af37]/20">
        <h3 class="text-xs font-black gold-accent uppercase tracking-widest mb-4 italic">📍 Shopping Radar: Bad Hersfeld</h3>
        <div class="space-y-3">
            <div class="flex justify-between items-center bg-black/40 p-3 rounded-xl border border-gray-900"><span class="text-[10px] font-bold">LIDL (Hersfelder Str.)</span><span class="text-[10px] text-[#00ff41] font-mono italic">Butter 1.49€</span></div>
            <div class="flex justify-between items-center bg-black/40 p-3 rounded-xl border border-gray-900"><span class="text-[10px] font-bold">ALDI (Marktplatz)</span><span class="text-[10px] text-[#00ff41] font-mono italic">Eier 1.99€</span></div>
            <div class="flex justify-between items-center bg-black/40 p-3 rounded-xl border border-gray-900"><span class="text-[10px] font-bold">REWE (City)</span><span class="text-[10px] text-[#00ff41] font-mono italic">Milch 1.15€</span></div>
        </div>
    </section>

    <div class="glass p-6 rounded-[2.5rem]">
        <div class="flex justify-between items-center mb-6">
            <h3 id="zT" class="text-[11px] font-black text-[#d4af37] uppercase tracking-widest">Inventar: Kühlzone</h3>
            <button onclick="localStorage.removeItem('GK'); location.reload();" class="text-[8px] border border-red-500 text-red-500 px-3 py-1.5 rounded-full font-black uppercase">Key Reset</button>
        </div>
        <div id="invList" class="space-y-4 text-xs min-h-[100px]">
            <p class="text-center py-10 italic text-gray-700 text-[9px] uppercase tracking-widest">Synchronisiere...</p>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE SETUP ---
        const fbConfig = { apiKey: "AIzaSyDqqn39l6M8r-YC-R5utkwfG4En2OfUnpQ", authDomain: "gen-lang-client-0348637849.firebaseapp.com", projectId: "gen-lang-client-0348637849", storageBucket: "gen-lang-client-0348637849.firebasestorage.app", messagingSenderId: "1008937513696", appId: "1:1008937513696:web:1c0a2bc7792daf689a5685" };
        
        // --- 2. KEY PROTECTION (STRATEGIE A) ---
        let GK = localStorage.getItem('GK');
        if (!GK) {
            GK = prompt("TACTICAL LOGIN: Google AI Key eingeben:");
            if (GK) localStorage.setItem('GK', GK);
        }

        firebase.initializeApp(fbConfig);
        const db = firebase.firestore();
        let curZ = 'FRIDGE', camOn = false, allStock = [];

        const video = document.getElementById('v'), sBtn = document.getElementById('sBtn'), aiMsg = document.getElementById('aiMsg');

        // --- 3. TELEMETRIE (Live-Temp) ---
        function syncT() {
            db.collection("telemetry").doc("fridge_stats").onSnapshot(doc => {
                if (doc.exists) document.getElementById('liveTemp').innerText = doc.data().temp + "°C";
            });
        }

        // --- 4. INVENTAR SYNC ---
        function syncI() {
            db.collection("inventory").orderBy("addedAt", "desc").onSnapshot(snap => {
                allStock = snap.docs.map(d => ({id: d.id, ...d.data()}));
                const dbS = document.getElementById('dbStatus');
                dbS.innerText = "Online ●";
                dbS.className = "text-[9px] font-black uppercase text-[#00ff41] status-blink";
                render();
            });
        }

        function render() {
            const filtered = allStock.filter(i => i.zone === curZ);
            document.getElementById('invList').innerHTML = filtered.map(i => `
                <div class="flex justify-between items-center py-3 border-b border-gray-900/50">
                    <span class="font-black text-white uppercase tracking-tighter italic text-xs">${i.name}</span>
                    <span class="text-[9px] text-gray-500 font-mono bg-black px-2 py-1 rounded border border-gray-800 uppercase italic">${i.mhd || 'MHD offen'}</span>
                </div>
            `).join('') || '<p class="text-center py-8 text-gray-800 font-black uppercase text-[9px]">Zone Leer</p>';
        }

        // --- 5. KITCHEN CHEF DIALOG ---
        document.getElementById('vBtn').addEventListener('click', async () => {
            if(!GK || allStock.length === 0) { alert("Inventar leer!"); return; }
            aiMsg.innerText = "VITO Command analysiert Bestand...";
            const names = allStock.map(i => i.name).join(', ');
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GK}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Ich habe: ${names}. Schlage Nadine 1 schnelles Gericht vor. Nenne kurz 2 Zutaten die fehlen.` }] }] })
                });
                const d = await res.json();
                const text = d.candidates[0].content.parts[0].text;
                document.getElementById('recipeBox').classList.remove('hidden');
                document.getElementById('recipeText').innerText = text;
                aiMsg.innerText = "Guten Appetit, Nadine!";
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
            } catch (e) { alert("Analyse-Fehler. Key prüfen!"); }
        });

        // --- 6. SCANNER LOGIK (Vision) ---
        sBtn.addEventListener('click', async () => {
            if (!camOn) {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = s; video.classList.remove('hidden');
                document.getElementById('cp').classList.add('hidden');
                sBtn.innerText = "Einheit Scannen"; camOn = true;
            } else {
                analyze();
            }
        });

        async function analyze() {
            sBtn.disabled = true; sBtn.innerText = "KI-SCOUTER PRÜFT...";
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const b64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GK}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: "Was ist das? Antwort NUR JSON: { 'name': '...', 'mhd': '...' }" },
                            { inline_data: { mime_type: "image/jpeg", data: b64 } }
                        ]}]
                    })
                });
                const d = await res.json();
                const raw = d.candidates[0].content.parts[0].text;
                const data = JSON.parse(raw.substring(raw.indexOf('{'), raw.lastIndexOf('}') + 1));
                await db.collection("inventory").add({ ...data, zone: curZ, addedAt: firebase.firestore.FieldValue.serverTimestamp() });
                if(navigator.vibrate) navigator.vibrate(100);
            } catch (e) { alert("Scan fehlgeschlagen. Bitte Licht prüfen!"); }
            sBtn.disabled = false; sBtn.innerText = "Einheit Scannen";
        }

        window.setZone = (z) => {
            curZ = z;
            document.getElementById('zT').innerText = "Inventar: " + (z=='FRIDGE'?'Kühlzone':z=='FREEZER'?'Frostzone':'Vorratskammer');
            ['FRIDGE','FREEZER','PANTRY'].forEach(id => document.getElementById('z-'+id).classList.toggle('zone-active', id === z));
            render();
        };

        syncT(); syncI();
    </script>
</body>
</html>
