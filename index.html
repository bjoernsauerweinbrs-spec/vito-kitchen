<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GERD 2.0 | THE LEGACY</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { 
            --gold: #d4af37; --gold-l: #f9f295; --gold-d: #b88a44;
            --neon: #00f2ff; --bg: #020202; 
        }

        body { 
            background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 15px; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #020202 100%);
        }

        /* GOLDEN LEGACY HEADER */
        .legacy-header { text-align: center; margin: 30px 0; }
        .gold-brand { 
            font-size: 32px; font-weight: 900; font-style: italic; text-transform: uppercase;
            background: linear-gradient(to bottom, var(--gold-l) 0%, var(--gold) 40%, var(--gold-d) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(212,175,55,0.4));
        }

        /* NAVIGATION HUB */
        .nav-hub { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 25px; }
        .nav-node { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,55,0.1); 
            padding: 12px 0; border-radius: 10px; text-align: center; cursor: pointer; 
        }
        .nav-node.active { background: var(--gold); box-shadow: 0 0 15px var(--gold); }
        .nav-node.active span { color: #000; font-weight: 900; }
        .nav-node span { font-size: 7px; text-transform: uppercase; display: block; margin-top: 4px; color: #666; }

        /* VISION UNIT */
        .scouter-frame { 
            background: rgba(255,255,255,0.02); border: 1px solid rgba(212,175,55,0.2); 
            border-radius: 35px; padding: 12px; margin-bottom: 25px; transition: 0.3s;
        }
        .success-flash { border-color: var(--gold) !important; box-shadow: 0 0 30px var(--gold); }
        .viewport { 
            width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 25px; 
            overflow: hidden; position: relative; border: 1px solid #111;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .scan-line { 
            position: absolute; width: 100%; height: 3px; background: var(--neon); top: 0; 
            animation: scan 2s linear infinite; box-shadow: 0 0 15px var(--neon); z-index: 100;
        }
        @keyframes scan { from { top: 0%; } to { top: 100%; } }

        .cmd-btn { 
            width: 100%; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-d) 100%);
            border: none; padding: 20px; border-radius: 15px; color: #000; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 1px; margin-top: 12px; cursor: pointer;
        }

        /* DATA DISPLAY */
        .data-card { 
            background: rgba(255,255,255,0.02); border-radius: 25px; padding: 20px; 
            border: 1px solid rgba(255,255,255,0.05); min-height: 200px;
        }
        .stream-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); 
        }
        .stream-row b { font-style: italic; text-transform: uppercase; color: var(--gold); font-size: 13px; }

        /* TERMINAL / LOG */
        .terminal { 
            background: #000; border: 1px solid #222; border-radius: 12px; 
            padding: 10px; font-family: monospace; font-size: 9px; color: var(--neon); 
            height: 70px; overflow-y: auto; margin-top: 15px;
        }
        .err-msg { color: #ff3e3e; font-weight: bold; }
    </style>
</head>
<body>

    <div class="legacy-header">
        <div class="gold-brand">Gerd 2.0 – The Legacy</div>
        <div style="font-size: 7px; color: var(--neon); letter-spacing: 3px; margin-top: 5px; text-transform: uppercase; opacity: 0.5;">Tactical Hub Bad Hersfeld</div>
    </div>

    <nav class="nav-hub">
        <div onclick="sm('FRIDGE')" id="t-FRIDGE" class="nav-node active">❄️<span>Kühl</span></div>
        <div onclick="sm('FREEZER')" id="t-FREEZER" class="nav-node">🧊<span>Frost</span></div>
        <div onclick="sm('PANTRY')" id="t-PANTRY" class="nav-node">📦<span>Vorrat</span></div>
        <div onclick="sm('SHOP')" id="t-SHOP" class="nav-node">🛒<span>Kauf</span></div>
        <div onclick="sm('CHEF')" id="t-CHEF" class="nav-node">👨‍🍳<span>Chef</span></div>
    </nav>

    <div id="scouter-ui" class="scouter-frame">
        <div class="viewport">
            <div id="s-line" class="scan-line" style="display:none;"></div>
            <video id="v" autoplay playsinline muted style="display:none;"></video>
            <div id="p-text" style="padding-top:45%; text-align:center; color:#151515; font-weight:900; font-size:10px; letter-spacing:3px;">SYSTEM STANDBY</div>
        </div>
        <button id="sBtn" class="cmd-btn">Initiate Vision Scan</button>
    </div>

    <div class="data-card">
        <div id="l-content"></div>
        <button id="intelBtn" onclick="runIntel()" class="cmd-btn" style="display:none; background: var(--neon);">Execute Strategy</button>
        <div id="intel-out" style="margin-top:15px; font-size:11px; color:var(--neon); font-style:italic;"></div>
    </div>

    <div class="terminal" id="term">> System initialisiert...</div>

    <div style="text-align:center; margin-top:20px;">
        <span onclick="localStorage.removeItem('GRK'); location.reload();" style="color:#222; font-size:8px; text-decoration:underline;">API-KEY RESET</span>
    </div>

    <script>
        const log = (m, isErr=false) => { 
            const t = document.getElementById('term'); 
            t.innerHTML += `<br><span class="${isErr?'err-msg':''}">> ${m}</span>`; 
            t.scrollTop = t.scrollHeight; 
        };

        const cfg = { apiKey: "AIzaSyDqqn39l6M8r-YC-R5utkwfG4En2OfUnpQ", authDomain: "gen-lang-client-0348637849.firebaseapp.com", projectId: "gen-lang-client-0348637849", storageBucket: "gen-lang-client-0348637849.firebasestorage.app", messagingSenderId: "1008937513696", appId: "1:1008937513696:web:1c0a2bc7792daf689a5685" };
        
        let GRK = localStorage.getItem('GRK'), mode = 'FRIDGE', stock = [];

        if(!GRK) { GRK = prompt("Groq/Llama Vision Key (gsk_...) eingeben:"); if(GRK) localStorage.setItem('GRK', GRK.trim()); }

        firebase.initializeApp(cfg);
        const db = firebase.firestore();

        db.collection("inventory").orderBy("addedAt", "desc").onSnapshot(s => {
            stock = s.docs.map(d => ({id: d.id, ...d.data()}));
            log("Bestand synchronisiert.");
            render();
        });

        function render() {
            const cont = document.getElementById('l-content');
            const filtered = stock.filter(i => i.zone === mode);
            document.getElementById('scouter-ui').style.display = (mode === 'CHEF' ? 'none' : 'block');
            document.getElementById('intelBtn').style.display = (mode === 'SHOP' || mode === 'CHEF' ? 'block' : 'none');
            
            cont.innerHTML = filtered.map(i => `
                <div class="stream-row">
                    <b>${i.name}</b>
                    <span onclick="del('${i.id}')" style="color:#ff3e3e; font-size:18px;">×</span>
                </div>
            `).join('') || '<div style="text-align:center; padding:40px; color:#111; font-weight:900; font-size:10px;">ZONE EMPTY</div>';
        }

        async function del(id) { if(confirm("Löschen?")) await db.collection("inventory").doc(id).delete(); }

        window.sm = (m) => {
            mode = m; document.getElementById('intel-out').innerText = '';
            ['FRIDGE','FREEZER','PANTRY','SHOP','CHEF'].forEach(t => document.getElementById('t-'+t).classList.toggle('active', t === m));
            render();
        };

        const vid = document.getElementById('v'), sBtn = document.getElementById('sBtn'), sLine = document.getElementById('s-line');
        let cam = false;

        sBtn.onclick = async () => {
            if(!cam) {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    vid.srcObject = s; vid.style.display = "block";
                    document.getElementById('p-text').style.display = "none";
                    cam = true; sBtn.innerText = "Execute Analysis";
                    log("Kamera aktiv.");
                } catch(e) { log("Kamera-Fehler: " + e.message, true); }
            } else {
                analyze();
            }
        };

        async function analyze() {
            sBtn.disabled = true; sBtn.innerText = "Analyzing Stream...";
            sLine.style.display = "block";
            
            const can = document.createElement('canvas'); 
            can.width = 640; can.height = 640;
            can.getContext('2d').drawImage(vid, 0, 0, 640, 640);
            
            try {
                log("Sende Daten an Groq Llama-3.2...");
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GRK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.2-11b-vision",
                        messages: [{ role: "user", content: [
                            { type: "text", text: "Multi-Scan: Identify products. JSON ONLY: [ { 'name': '...', 'mhd': '...' } ]" },
                            { type: "image_url", image_url: { url: can.toDataURL('image/jpeg', 0.5) } }
                        ]}],
                        temperature: 0.1
                    })
                });

                if(!res.ok) throw new Error("API-Verbindung fehlgeschlagen.");

                const j = await res.json();
                const content = j.choices[0].message.content;
                const items = JSON.parse(content.match(/\[.*\]/s)[0]);
                
                for(let item of items) {
                    await db.collection("inventory").add({ ...item, zone: mode, addedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    log(`Erfolgreich: ${item.name}`);
                    window.speechSynthesis.speak(new SpeechSynthesisUtterance("Check: " + item.name));
                }
                
                document.getElementById('scouter-ui').classList.add('success-flash');
                setTimeout(() => document.getElementById('scouter-ui').classList.remove('success-flash'), 600);
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);

            } catch(e) {
                log("FEHLER: " + e.message, true);
                alert("Scan-Abbruch: " + e.message);
            }
            
            sBtn.disabled = false; sBtn.innerText = "Execute Analysis";
            sLine.style.display = "none";
        }

        async function runIntel() {
            const out = document.getElementById('intel-out');
            out.innerText = "Calculating Tactical Solution...";
            const inv = stock.map(i => i.name).join(", ");
            const p = mode === 'CHEF' ? `Bestand: ${inv}. Rezept & Einkauf Bad Hersfeld.` : `Einkaufsliste: ${stock.filter(i=>i.zone==='SHOP').map(i=>i.name)}. Wo in Bad Hersfeld (Lidl, Aldi, REWE) ist es am günstigsten?`;
            
            try {
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GRK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: p }] })
                });
                const j = await r.json();
                out.innerText = j.choices[0].message.content;
            } catch(e) { out.innerText = "Sync Error."; }
        }
    </script>
</body>
</html>
