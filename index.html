<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NABY KEÏTA HUB V83 | FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --neon: #00f2ff; --gold: #d4af37; --bg: #050505; --card: rgba(255,255,255,0.03); }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; margin: 15px 0 25px; border-left: 4px solid var(--neon); padding-left: 15px; }
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 20px; }
        .nav-btn { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 12px 0; color: #444; font-size: 7px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .nav-active { background: var(--neon) !important; color: #000 !important; font-weight: 900; }
        .scouter { background: var(--card); border-radius: 2rem; padding: 15px; border: 1px solid rgba(0,242,255,0.1); margin-bottom: 20px; position: relative; }
        .viewport { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 1.5rem; overflow: hidden; position: relative; border: 1px solid #111; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .laser { position: absolute; width: 100%; height: 2px; background: var(--neon); top: 0; animation: scan 2s linear infinite; z-index: 10; display: none; box-shadow: 0 0 15px var(--neon); }
        @keyframes scan { from { top: 0%; } to { top: 100%; } }
        .action-btn { width: 100%; background: var(--neon); color: #000; border: none; padding: 18px; border-radius: 1.2rem; font-weight: 900; font-size: 13px; text-transform: uppercase; margin-top: 15px; cursor: pointer; }
        .card { background: var(--card); border-radius: 2rem; padding: 20px; border: 1px solid rgba(255,255,255,0.03); min-height: 250px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #0d0d0d; }
        .row b { font-style: italic; text-transform: uppercase; font-size: 13px; }
        .ai-box { background: rgba(0,242,255,0.05); border: 1px solid var(--neon); border-radius: 1.5rem; padding: 15px; margin-bottom: 15px; font-size: 11px; color: #00f2ff; line-height: 1.4; font-style: italic; display: none; }
        .terminal { background: #000; border-radius: 1rem; padding: 10px; font-family: monospace; font-size: 9px; color: #00f2ff; height: 60px; overflow-y: auto; margin-top: 15px; border: 1px solid #222; }
    </style>
</head>
<body>

    <header class="header">
        <div>
            <h1 style="font-style: italic;">NABY KEÏTA <span style="color:var(--neon)">HUB</span></h1>
            <div style="font-size:7px; color:#444; letter-spacing:3px; text-transform:uppercase;">Master Legacy V83.0 | 2026</div>
        </div>
        <div id="led" style="font-size: 9px; font-weight: 900; color: #ff3e3e;">SYNC ●</div>
    </header>

    <nav class="nav-grid">
        <button onclick="sm('FRIDGE')" id="t-FRIDGE" class="nav-btn nav-active">Kühl</button>
        <button onclick="sm('FREEZER')" id="t-FREEZER" class="nav-btn">Frost</button>
        <button onclick="sm('PANTRY')" id="t-PANTRY" class="nav-btn">Vorrat</button>
        <button onclick="sm('SHOP')" id="t-SHOP" class="nav-btn">Kauf</button>
        <button onclick="sm('CHEF')" id="t-CHEF" class="nav-btn">Chef</button>
    </nav>

    <div id="scouter-ui" class="scouter">
        <div class="viewport">
            <div id="laser" class="laser"></div>
            <video id="v" autoplay playsinline muted style="display:none;"></video>
            <div id="p-text" style="padding:45% 0; text-align:center; color:#111; font-weight:900; font-size:10px; letter-spacing:4px;">MULTI-VISION READY</div>
        </div>
        <button id="sBtn" class="action-btn">Multi-Erfassung Starten</button>
    </div>

    <div class="card">
        <div id="ai-output" class="ai-box"></div>
        
        <div id="chef-controls" style="display:none; margin-bottom:20px;">
            <select id="theme" class="nav-btn" style="width:100%; color:#fff; padding:10px; margin-bottom:10px;">
                <option value="Italienisch">Italienisch</option>
                <option value="Asiatisch">Asiatisch</option>
                <option value="Kino/Snacks">Kino & Snacks</option>
            </select>
            <button onclick="runStrategy('CHEF')" class="action-btn" style="background:var(--gold);">Rezept berechnen</button>
        </div>

        <div id="shop-controls" style="display:none; margin-bottom:20px;">
            <button onclick="runStrategy('SHOP')" class="action-btn" style="background:var(--gold);">Bad Hersfeld Preis-Check</button>
        </div>

        <div id="l-content"></div>
    </div>

    <div class="terminal" id="term">> System-Check Bad Hersfeld...</div>

    <script>
        const log = (m) => { const t = document.getElementById('term'); t.innerHTML += `<br>> ${m}`; t.scrollTop = t.scrollHeight; };
        const cfg = { apiKey: "AIzaSyDqqn39l6M8r-YC-R5utkwfG4En2OfUnpQ", authDomain: "gen-lang-client-0348637849.firebaseapp.com", projectId: "gen-lang-client-0348637849", storageBucket: "gen-lang-client-0348637849.firebasestorage.app", messagingSenderId: "1008937513696", appId: "1:1008937513696:web:1c0a2bc7792daf689a5685" };
        
        let GRK = localStorage.getItem('GRK'), curM = 'FRIDGE', stock = [];

        if(!GRK) { GRK = prompt("Groq Key eingeben:"); if(GRK) localStorage.setItem('GRK', GRK.trim()); }

        firebase.initializeApp(cfg);
        const db = firebase.firestore();

        db.collection("inventory").orderBy("addedAt", "desc").onSnapshot(s => {
            stock = s.docs.map(d => ({id: d.id, ...d.data()}));
            document.getElementById('led').style.color = "#00ff41";
            document.getElementById('led').innerText = "LIVE ●";
            render();
        });

        function render() {
            const cont = document.getElementById('l-content');
            const filtered = stock.filter(i => i.zone === curM);
            document.getElementById('chef-controls').style.display = (curM === 'CHEF' ? 'block' : 'none');
            document.getElementById('shop-controls').style.display = (curM === 'SHOP' ? 'block' : 'none');
            document.getElementById('scouter-ui').style.display = (curM === 'CHEF' ? 'none' : 'block');
            
            cont.innerHTML = filtered.map(i => `<div class="row"><b>${i.name}</b><span onclick="del('${i.id}')" style="color:#ff3e3e;">×</span></div>`).join('') || '<div style="text-align:center; padding:30px; color:#111; font-size:10px;">BEREIT</div>';
        }

        async function del(id) { if(confirm("Löschen?")) await db.collection("inventory").doc(id).delete(); }

        window.sm = (m) => {
            curM = m; render();
            document.getElementById('ai-output').style.display = 'none';
            ['FRIDGE','FREEZER','PANTRY','SHOP','CHEF'].forEach(t => document.getElementById('t-'+t).classList.toggle('nav-active', t === m));
        };

        const v = document.getElementById('v'), sBtn = document.getElementById('sBtn');
        let cam = false;

        sBtn.onclick = async () => {
            if(!cam) {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                v.srcObject = s; v.style.display = "block";
                document.getElementById('p-text').style.display = "none";
                cam = true; log("Kamera gestartet.");
            } else {
                analyze();
            }
        };

        async function analyze() {
            sBtn.disabled = true; sBtn.innerText = "KI SCANNT MULTI-PRODUKTE...";
            document.getElementById('laser').style.display = "block";
            const can = document.createElement('canvas'); can.width = 700; can.height = 700;
            can.getContext('2d').drawImage(v, 0, 0, 700, 700);
            
            try {
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GRK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        // DAS NEUE STABILE MODELL
                        model: "llama-3.2-11b-vision",
                        messages: [{ role: "user", content: [
                            { type: "text", text: "Erkenne alle Produkte. Antworte NUR als JSON-Array: [ { 'name': '...', 'mhd': '...' } ]" },
                            { type: "image_url", image_url: { url: can.toDataURL('image/jpeg', 0.5) } }
                        ]}]
                    })
                });
                const j = await r.json();
                const items = JSON.parse(j.choices[0].message.content.match(/\[.*\]/s)[0]);
                
                for(let item of items) {
                    await db.collection("inventory").add({ ...item, zone: curM, addedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    log(`ERFASST: ${item.name}`);
                    window.speechSynthesis.speak(new SpeechSynthesisUtterance("Check: " + item.name));
                }
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            } catch(e) { log("FEHLER: " + e.message); }
            sBtn.disabled = false; sBtn.innerText = "Multi-Erfassung Starten";
            document.getElementById('laser').style.display = "none";
        }

        async function runStrategy(type) {
            const out = document.getElementById('ai-output');
            out.style.display = 'block'; out.innerText = "KI berechnet Strategie...";
            const inv = stock.map(i => i.name).join(", ");
            const prompt = type === 'CHEF' 
                ? `Thema: ${document.getElementById('theme').value}. Bestand: ${inv}. Gib ein kurzes Rezept und die Einkaufsliste für Bad Hersfeld.`
                : `Einkaufsliste: ${stock.filter(i => i.zone === 'SHOP').map(i => i.name).join(', ')}. Wo in Bad Hersfeld (Lidl Friedloser Str, Aldi, REWE Erfurter Str) ist es gerade am günstigsten?`;

            try {
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GRK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: prompt }] })
                });
                const j = await r.json();
                out.innerText = j.choices[0].message.content;
            } catch(e) { out.innerText = "Fehler bei Strategie-Berechnung."; }
        }
    </script>
</body>
</html>
