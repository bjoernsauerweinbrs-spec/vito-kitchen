<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GERD 2.0 | CLOUD-RECOVERY</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --gold-l: #f9f295; --gold-d: #b88a44; --neon: #00f2ff; --bg: #010101; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 15px; background-image: radial-gradient(circle at 50% 0%, #151515 0%, #010101 100%); overflow-x: hidden; }
        #gatekeeper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .gold-brand { font-size: 32px; font-weight: 900; font-style: italic; text-transform: uppercase; background: linear-gradient(to bottom, var(--gold-l) 0%, var(--gold) 40%, var(--gold-d) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(212,175,55,0.4)); }
        .nav-hub { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 20px 0; }
        .nav-node { background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.2); padding: 12px 0; border-radius: 10px; text-align: center; cursor: pointer; }
        .nav-node.active { background: var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.4); }
        .nav-node.active span { color: #000; font-weight: 900; }
        .nav-node span { font-size: 7px; text-transform: uppercase; display: block; margin-top: 5px; color: #888; }
        .scouter-frame { background: rgba(255,255,255,0.02); border: 1px solid rgba(0,242,255,0.2); border-radius: 20px; padding: 15px; position: relative; margin-bottom: 20px; }
        .viewport { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 15px; overflow: hidden; position: relative; border: 1px solid #222; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .laser { position: absolute; width: 100%; height: 3px; background: var(--neon); top: 0; animation: scan 2s linear infinite; display: none; box-shadow: 0 0 15px var(--neon); z-index: 100; }
        @keyframes scan { from { top: 0%; } to { top: 100%; } }
        #scan-feedback { position:absolute; inset:0; display:none; justify-content:center; align-items:center; flex-direction:column; background:rgba(0,0,0,0.85); z-index:150; padding:20px; text-align:center; }
        .check-item { display:flex; align-items:center; margin:10px 0; font-size:15px; color:#fff; }
        .cmd-btn { width: 100%; background: var(--gold); border: none; padding: 16px; border-radius: 12px; color: #000; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 11px; }
        .data-card { background: rgba(255,255,255,0.02); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); min-height: 150px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #111; }
        .qty-badge { background: #333; color: var(--gold); padding: 3px 8px; border-radius: 5px; font-size: 12px; margin-right: 10px; font-weight: bold; border: 1px solid var(--gold); }
        .mhd-edit { background: none; border: 1px solid rgba(0,242,255,0.3); color: var(--neon); font-size: 11px; width: 80px; padding: 5px; border-radius: 5px; text-align: center; }
        .terminal { background: #000; border: 1px solid #333; border-radius: 10px; padding: 10px; font-family: monospace; font-size: 10px; color: #00f2ff; height: 100px; overflow-y: auto; margin-top: 15px; }
        .reset-link { color: #555; font-size: 10px; text-decoration: underline; cursor: pointer; display: block; text-align: center; margin-top: 15px; }
        .config-input { width:85%; padding:10px; margin-bottom:10px; background:#111; border:1px solid #333; color:#00ff41; font-family:monospace; font-size:10px; border-radius:8px; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="gold-brand">GERD 2.0</div>
        <div style="color: #888; font-size: 10px; margin: 10px 0;">INITIALISIERUNG DER BEFEHLSKETTE</div>
        <input type="password" id="api-input" class="config-input" style="color: #fff; font-size: 14px;" placeholder="Groq API Key">
        <input type="text" id="team-input" class="config-input" style="color: #fff; font-size: 14px;" placeholder="Team-Name (z.B. Sauerwein)">
        
        <div style="color: var(--gold); font-size: 10px; margin-top: 10px;">FIREBASE CONFIG OBJEKT HIER PASTEN:</div>
        <textarea id="fb-config-input" class="config-input" rows="5" placeholder='{ "apiKey": "...", "projectId": "...", ... }'></textarea>
        
        <button onclick="saveSetup()" class="cmd-btn" style="width:85%; margin-top: 10px;">VERBINDUNG HERSTELLEN</button>
        <div style="color: #444; font-size: 9px; margin-top: 15px; padding: 0 20px;">Die Config findest du in Firebase unter: <br>Projekt-Einstellungen > Allgemein > Ihre Apps</div>
    </div>

    <div id="main-app" style="display:none;">
        <div style="text-align:center; margin-bottom:10px;"><span class="gold-brand" style="font-size:24px;">Gerd 2.0 – The Legacy</span></div>

        <nav class="nav-hub">
            <div onclick="sm('FRIDGE')" id="t-FRIDGE" class="nav-node active">❄️<span>Kühl</span></div>
            <div onclick="sm('FREEZER')" id="t-FREEZER" class="nav-node">🧊<span>Frost</span></div>
            <div onclick="sm('PANTRY')" id="t-PANTRY" class="nav-node">📦<span>Vorrat</span></div>
            <div onclick="sm('SHOP')" id="t-SHOP" class="nav-node">🛒<span>Kauf</span></div>
            <div onclick="sm('CHEF')" id="t-CHEF" class="nav-node">👨‍🍳<span>Chef</span></div>
        </nav>

        <div id="ui-scouter" class="scouter-frame">
            <div class="viewport">
                <div id="laser" class="laser"></div>
                <div id="scan-feedback"></div>
                <video id="v" autoplay playsinline muted style="display:none;"></video>
                <div id="p-text" style="padding-top:45%; text-align:center; color:#444; font-weight:900; letter-spacing:4px;">SCANNER READY</div>
            </div>
            <div class="btn-grid">
                <button id="sBtn" onclick="toggleCamera()" class="cmd-btn">Kamera Starten</button>
                <button id="stopBtn" onclick="stopCam()" class="cmd-btn" style="background:#333; color:#fff; display:none;">Kamera Stop</button>
            </div>
        </div>

        <div id="ui-chef" class="data-card" style="display:none; border: 1px solid var(--neon);">
            <input type="text" id="chef-input" style="width:100%; background:#000; border:1px solid var(--neon); color:#fff; padding:15px; border-radius:12px; outline:none;" placeholder="Was kochen wir?">
            <button onclick="runKaroChef()" class="cmd-btn" style="background:var(--neon); margin-top:10px;">Karo AI Strategie</button>
            <div id="chef-out" style="margin-top:15px; font-size:13px; line-height:1.6; white-space:pre-wrap;"></div>
        </div>

        <button onclick="cloudDiagnosis()" class="cmd-btn" style="background:#111; border:1px solid #333; color:#888; margin-bottom: 15px;">📡 CLOUD-VERBINDUNG TESTEN</button>

        <div class="manual-add" style="display: flex; gap: 5px; margin-bottom: 15px;">
            <input type="text" id="manual-name" style="flex:1; background:#111; border:1px solid var(--gold); border-radius:8px; color:#fff; padding:12px;" placeholder="Produkt manuell...">
            <button onclick="addManual()" class="cmd-btn" style="width:auto; padding:0 20px;">+</button>
        </div>

        <div class="data-card"><div id="l-content"></div></div>
        <div class="terminal" id="term">> System online...</div>
        <div class="reset-link" onclick="resetAll()">Sämtliche Daten löschen & Reset</div>
    </div>

    <script>
        let GRK = localStorage.getItem('GRK'), TEAM = localStorage.getItem('TEAM'), FBC = localStorage.getItem('FBC'), mode = 'FRIDGE', stock = [], db, camStream = null, scanLoop = null, scanPaused = false;
        const recentScans = new Map();

        if (GRK && TEAM && FBC) { 
            document.getElementById('gatekeeper').style.display = 'none'; 
            document.getElementById('main-app').style.display = 'block'; 
            initFirebase(); 
        }

        function saveSetup() {
            const k = document.getElementById('api-input').value, t = document.getElementById('team-input').value, f = document.getElementById('fb-config-input').value;
            if(k && t && f) { 
                localStorage.setItem('GRK', k); 
                localStorage.setItem('TEAM', t.trim().toLowerCase()); 
                localStorage.setItem('FBC', f);
                location.reload(); 
            } else { alert("Bitte fülle alle Felder aus!"); }
        }
        function resetAll() { if(confirm("Wirklich alles zurücksetzen?")) { localStorage.clear(); location.reload(); } }

        function initFirebase() {
            try {
                const config = JSON.parse(FBC);
                if (!firebase.apps.length) firebase.initializeApp(config);
                db = firebase.firestore();
                // FLACHE STRUKTUR: Ein Ordner für alle
                db.collection("gerd_inventory_v3")
                  .where("team", "==", TEAM)
                  .orderBy("addedAt", "desc")
                  .onSnapshot(s => {
                    stock = s.docs.map(d => ({id: d.id, ...d.data()}));
                    log(`Cloud-Sync: Aktiv (Team ${TEAM})`);
                    render();
                }, e => {
                    log("!!! FIREBASE FEHLER: " + e.message, true);
                    if(e.message.includes("permission-denied")) alert("ZUGRIFF VERWEIGERT! Nadine muss die Rules in Firebase auf 'if true' stellen.");
                });
            } catch(e) { log("Config-Fehler: " + e.message, true); }
        }

        async function cloudDiagnosis() {
            log("📡 Starte Cloud-Test...");
            try {
                const testDoc = await db.collection("gerd_inventory_v3").add({
                    name: "DIAGNOSE-TEST", team: TEAM, zone: "TEST", addedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                log("✅ SCHREIBEN OK! (ID: " + testDoc.id + ")");
                await db.collection("gerd_inventory_v3").doc(testDoc.id).delete();
                log("✅ LÖSCHEN OK!");
                alert("VERBINDUNG STEHT! Das System ist bereit.");
            } catch(e) {
                log("❌ TEST FEHLGESCHLAGEN: " + e.message, true);
                alert("Verbindungsfehler: " + e.message);
            }
        }

        function render() {
            const cont = document.getElementById('l-content');
            const filtered = stock.filter(i => i.zone === mode);
            document.getElementById('ui-scouter').style.display = (mode === 'CHEF' ? 'none' : 'block');
            document.getElementById('ui-chef').style.display = (mode === 'CHEF' ? 'block' : 'none');
            cont.innerHTML = filtered.map(i => `<div class="row"><div style="display:flex; align-items:center;"><span class="qty-badge">${i.qty || 1}x</span><div style="display:flex; flex-direction:column;"><b style="color:var(--gold); font-size:14px;">${i.name}</b><span style="font-size:10px; color:#555;">${i.mhd || '?'}</span></div></div><span onclick="del('${i.id}')" style="color:red; cursor:pointer; font-size:22px;">×</span></div>`).join('') || '<div style="text-align:center; padding:20px; color:#333;">LISTE LEER</div>';
        }

        async function del(id) { await db.collection("gerd_inventory_v3").doc(id).delete(); }
        async function addManual() {
            const n = document.getElementById('manual-name').value; if(!n) return;
            try {
                await db.collection("gerd_inventory_v3").add({ name: n, qty: 1, team: TEAM, zone: mode, mhd: '?', addedAt: firebase.firestore.FieldValue.serverTimestamp() });
                document.getElementById('manual-name').value = ''; log(`Cloud: ${n} gespeichert.`);
            } catch(e) { log("Fehler: " + e.message, true); }
        }
        window.sm = (m) => { mode = m; ['FRIDGE','FREEZER','PANTRY','SHOP','CHEF'].forEach(t => document.getElementById('t-'+t).classList.toggle('active', t === m)); render(); };

        const v = document.getElementById('v'), sBtn = document.getElementById('sBtn'), stopBtn = document.getElementById('stopBtn'), laser = document.getElementById('laser');
        function toggleCamera() {
            if(!camStream) {
                navigator.mediaDevices.getUserMedia({video:{facingMode:'environment', width:{ideal:1920}}})
                .then(s=>{ camStream=v.srcObject=s; v.style.display="block"; document.getElementById('p-text').style.display="none"; sBtn.innerText="Jetzt Scannen"; stopBtn.style.display="block"; });
            } else {
                if(scanLoop){ clearInterval(scanLoop); scanLoop=null; sBtn.innerText="Jetzt Scannen"; laser.style.display="none"; }
                else { analyze(true); scanLoop=setInterval(()=>analyze(true), 3500); sBtn.innerText="Dauerscan STOP"; }
            }
        }
        function stopCam() { if(scanLoop) clearInterval(scanLoop); if (camStream) camStream.getTracks().forEach(t => t.stop()); camStream = null; v.style.display = "none"; document.getElementById('p-text').style.display = "block"; stopBtn.style.display = "none"; sBtn.innerText = "Kamera Starten"; }

        async function analyze(multi = false) {
            if(scanPaused) return; laser.style.display = "block";
            const can = document.createElement('canvas'); can.width = 1280; can.height = 960;
            can.getContext('2d').drawImage(v, 0, 0, 1280, 960);
            try {
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GRK}` },
                    body: JSON.stringify({
                        model: "meta-llama/llama-4-scout-17b-16e-instruct",
                        messages: [{ role: "system", content: "Antworte NUR JSON." },
                        { role: "user", content: [{ type: "text", text: "Erkenne ALLES. JSON: {\"products\":[{\"name\":\"...\",\"anzahl\":1,\"mhd\":\"?\"}]}" }, { type: "image_url", image_url: { url: can.toDataURL('image/jpeg', 0.7) } }] }],
                        response_format: { type: "json_object" }
                    })
                });
                const j = await r.json(); const items = JSON.parse(j.choices[0].message.content).products || [];
                for(let it of items){
                    await db.collection("gerd_inventory_v3").add({
                        name: it.name, qty: it.anzahl||1, team: TEAM, zone: mode, mhd: it.mhd||'?', addedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    log("✅ Erfasst: " + it.name);
                }
            } catch(e) { log("Fehler: " + e.message, true); }
            laser.style.display = "none";
        }

        async function runKaroChef() {
            const i = document.getElementById('chef-input').value; const inv = stock.map(s => s.name).join(", ");
            try {
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST", headers: { "Authorization": `Bearer ${GRK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: `Kühlschrank: [${inv}]. Wunsch: "${i}". Rezept & Preise.` }] })
                });
                const j = await r.json(); document.getElementById('chef-out').innerText = j.choices[0].message.content;
            } catch(e) { document.getElementById('chef-out').innerText = "KI Fehler."; }
        }

        function toggleSmartEntnahme() {
            const btn = document.getElementById('voice-trigger-btn');
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = "de-DE"; rec.onstart = () => { btn.style.background = "red"; };
            rec.onresult = async (e) => {
                const t = e.results[0][0].transcript; log("Stimme: " + t);
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST", headers: { "Authorization": `Bearer ${GRK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: `Lösche laut: "${t}" aus ${JSON.stringify(stock)}. JSON: { "remove": [ { "id": "ID" } ] }` }], response_format: { type: "json_object" } })
                });
                const j = await r.json(); const updates = JSON.parse(j.choices[0].message.content).remove;
                for(let u of updates) { await db.collection("gerd_inventory_v3").doc(u.id).delete(); }
            };
            rec.onend = () => { btn.style.background = ""; }; rec.start();
        }
        const log = (m, isE=false) => { term.innerHTML += `<br><span style="color:${isE?'red':''}">> ${m}</span>`; term.scrollTop = term.scrollHeight; };
    </script>
</body>
</html>
