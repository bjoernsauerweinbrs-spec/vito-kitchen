<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GERD 2.0 | THE LEGACY</title>
    <style>
        :root { --gold: #d4af37; --gold-l: #f9f295; --gold-d: #b88a44; --neon: #00f2ff; --bg: #010101; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', -apple-system, sans-serif; margin: 0; padding: 15px; background-image: radial-gradient(circle at 50% 0%, #151515 0%, #010101 100%); overflow-x: hidden; }
        
        #gatekeeper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box; }
        .gold-brand { font-size: 32px; font-weight: 900; font-style: italic; text-transform: uppercase; background: linear-gradient(to bottom, var(--gold-l) 0%, var(--gold) 40%, var(--gold-d) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(212,175,55,0.4)); letter-spacing: -1px; }
        
        .nav-hub { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 20px 0; }
        .nav-node { background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.2); padding: 12px 0; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.3s; }
        .nav-node.active { background: var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.4); }
        .nav-node.active span { color: #000; font-weight: 900; }
        .nav-node span { font-size: 7px; text-transform: uppercase; display: block; margin-top: 5px; color: #888; }

        .scouter-frame { background: rgba(255,255,255,0.02); border: 1px solid rgba(0,242,255,0.2); border-radius: 20px; padding: 15px; position: relative; margin-bottom: 20px; }
        .viewport { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 15px; overflow: hidden; position: relative; border: 1px solid #222; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .laser { position: absolute; width: 100%; height: 3px; background: var(--neon); top: 0; animation: scan 2s linear infinite; display: none; box-shadow: 0 0 15px var(--neon); z-index: 100; }
        @keyframes scan { from { top: 0%; } to { top: 100%; } }

        #scan-feedback { position:absolute; inset:0; display:none; justify-content:center; align-items:center; flex-direction:column; background:rgba(0,0,0,0.85); z-index:150; padding:20px; text-align:center; }
        .check-item { display:flex; align-items:center; margin:10px 0; font-size:15px; animation:pop .25s ease-out; color:#fff; }
        .check-ok { width:26px; height:26px; border-radius:50%; background:#00ff41; color:#000; display:flex; align-items:center; justify-content:center; margin-right:12px; font-weight:900; }
        .check-warn { width:26px; height:26px; border-radius:50%; background:#ffaa00; color:#000; display:flex; align-items:center; justify-content:center; margin-right:12px; font-weight:900; }
        @keyframes pop { from{transform:scale(.5); opacity:0} to{transform:scale(1); opacity:1} }

        .cmd-btn { width: 100%; background: var(--gold); border: none; padding: 16px; border-radius: 12px; color: #000; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 11px; }
        .ai-panel { display: none; background: rgba(0, 242, 255, 0.05); border: 1px solid var(--neon); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .recipe-box { margin-top: 15px; font-size: 13px; line-height: 1.6; color: #eee; white-space: pre-wrap; border-top: 1px solid var(--neon); padding-top: 10px; }

        .data-card { background: rgba(255,255,255,0.02); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); min-height: 150px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #111; }
        .qty-badge { background: #333; color: var(--gold); padding: 3px 8px; border-radius: 5px; font-size: 12px; margin-right: 10px; font-weight: bold; border: 1px solid var(--gold); }
        .mhd-edit { background: none; border: 1px solid rgba(0,242,255,0.3); color: var(--neon); font-size: 11px; width: 85px; padding: 5px; border-radius: 5px; text-align: center; }
        
        .manual-add { display: flex; gap: 5px; margin-bottom: 15px; }
        .manual-input { flex: 1; background: #111; border: 1px solid var(--gold); border-radius: 8px; color: #fff; padding: 12px; outline: none; font-size: 13px; }
        .terminal { background: #000; border: 1px solid #333; border-radius: 10px; padding: 10px; font-family: monospace; font-size: 10px; color: #00f2ff; height: 60px; overflow-y: auto; margin-top: 15px; }
        .reset-link { color: #555; font-size: 10px; text-decoration: underline; cursor: pointer; display: block; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="gold-brand">GERD 2.0</div>
        <div style="color: #888; font-size: 10px; margin: 10px 0;">GOOGLE-CLOUD INITIALISIERUNG</div>
        <input type="password" id="api-input" class="manual-input" style="width: 80%; margin-bottom: 10px;" placeholder="Groq API Key">
        <input type="text" id="surl-input" class="manual-input" style="width: 80%; margin-bottom: 20px;" placeholder="Web-App URL (aus Apps Script)">
        <button onclick="saveSetup()" class="cmd-btn" style="width:80%;">SATELLIT STARTEN</button>
    </div>

    <div id="main-app" style="display:none;">
        <div style="text-align:center; margin-bottom:10px;"><span class="gold-brand" style="font-size:24px;">Gerd 2.0 – The Legacy</span></div>

        <nav class="nav-hub">
            <div onclick="sm('FRIDGE')" id="t-FRIDGE" class="nav-node active">❄️<span>Kühl</span></div>
            <div onclick="sm('FREEZER')" id="t-FREEZER" class="nav-node">🧊<span>Frost</span></div>
            <div onclick="sm('PANTRY')" id="t-PANTRY" class="nav-node">📦<span>Vorrat</span></div>
            <div onclick="sm('SHOP')" id="t-SHOP" class="nav-node">🛒<span>Kauf</span></div>
            <div onclick="sm('CHEF')" id="t-CHEF" class="nav-node">👨‍🍳<span>Chef</span></div>
        </nav>

        <div id="ui-scouter" class="scouter-frame">
            <div class="viewport">
                <div id="laser" class="laser"></div>
                <div id="scan-feedback"></div>
                <video id="v" autoplay playsinline muted style="display:none;"></video>
                <div id="p-text" style="padding-top:45%; text-align:center; color:#444; font-weight:900; letter-spacing:4px;">GOOGLE SYNC READY</div>
            </div>
            <div class="btn-grid">
                <button id="sBtn" onclick="toggleCamera()" class="cmd-btn">Kamera Starten</button>
                <button id="stopBtn" onclick="stopCam()" class="cmd-btn" style="background:#333; color:#fff; display:none;">Kamera Stop</button>
            </div>
        </div>

        <div id="ui-chef" class="ai-panel">
            <input type="text" id="chef-input" class="manual-input" style="width:100%; border:1px solid var(--neon);" placeholder="Karo AI Strategie...">
            <button onclick="runKaroChef()" class="cmd-btn" style="background:var(--neon); margin-top:10px;">Rezept Planen</button>
            <div id="chef-out" class="recipe-box"></div>
        </div>

        <div id="ui-shop" class="ai-panel">
            <button onclick="exportList()" class="cmd-btn" style="background:#fff; color:#000;">📤 LISTE EXPORTIEREN</button>
        </div>

        <button id="voice-trigger-btn" onclick="toggleSmartEntnahme()" style="width:100%; background:rgba(0,242,255,0.1); border:1px solid var(--neon); padding:15px; border-radius:12px; color:var(--neon); font-weight:900; text-transform:uppercase; margin-bottom:15px; cursor:pointer;">🎙️ Smarte Entnahme</button>

        <div class="manual-add" id="manual-form">
            <input type="text" id="manual-name" class="manual-input" placeholder="Manuell hinzufügen...">
            <button onclick="addManual()" class="cmd-btn" style="width:auto; padding:0 20px;">+</button>
        </div>

        <div class="data-card"><div id="l-content"></div></div>
        <div class="terminal" id="term">> System online...</div>
        <div class="reset-link" onclick="localStorage.clear(); location.reload();">Reset Config & Cloud</div>
    </div>

    <script>
        let GRK = localStorage.getItem('GRK'), SURL = localStorage.getItem('SURL'), mode = 'FRIDGE', stock = [], camStream = null, scanLoop = null, scanPaused = false;
        const recentScans = new Map();

        if (GRK && SURL) { document.getElementById('gatekeeper').style.display = 'none'; document.getElementById('main-app').style.display = 'block'; refreshData(); setInterval(refreshData, 10000); }
        function saveSetup() { const k = document.getElementById('api-input').value, s = document.getElementById('surl-input').value; if(k && s) { localStorage.setItem('GRK', k); localStorage.setItem('SURL', s.trim()); location.reload(); } }

        async function refreshData() {
            try {
                const r = await fetch(SURL);
                const data = await r.json();
                stock = data.sort((a,b) => new Date(b.addedAt) - new Date(a.addedAt));
                log(`Google-Sync: OK (${stock.length} Artikel)`);
                render();
            } catch(e) { log("Sync Fehler", false); }
        }

        function render() {
            const cont = document.getElementById('l-content');
            const filtered = stock.filter(i => i.zone === mode);
            document.getElementById('ui-scouter').style.display = (mode === 'CHEF' || mode === 'SHOP' ? 'none' : 'block');
            document.getElementById('ui-chef').style.display = (mode === 'CHEF' ? 'block' : 'none');
            document.getElementById('ui-shop').style.display = (mode === 'SHOP' ? 'block' : 'none');
            document.getElementById('manual-form').style.display = (mode === 'CHEF' || mode === 'SHOP' ? 'none' : 'flex');
            cont.innerHTML = filtered.map(i => `<div class="row"><div style="display:flex; align-items:center;"><span class="qty-badge">${i.qty}x</span><div><b style="color:var(--gold);">${i.name}</b><br><input type="text" class="mhd-edit" value="${i.mhd}" onchange="updateMHD('${i.id}', this.value)"></div></div><span onclick="del('${i.id}')" style="color:red; cursor:pointer; font-size:22px;">×</span></div>`).join('') || '<div style="text-align:center; padding:20px; color:#333;">LISTE LEER</div>';
        }

        async function push(action, name, qty, mhd, id) {
            await fetch(SURL, { method: "POST", mode: "no-cors", body: JSON.stringify({action, name, qty, mhd, zone: mode, id}) });
            setTimeout(refreshData, 1500);
        }

        async function updateMHD(id, val) { log("Aktualisiere MHD..."); await push("updateMHD", "", 0, val, id); }
        async function del(id) { if(confirm("Löschen?")) { await push("delete", "", 0, "", id); stock = stock.filter(i => i.id !== id); render(); } }
        async function addManual() { const n = document.getElementById('manual-name').value; if(n) { const id = "ID"+Date.now(); await push("add", n, 1, "?", id); document.getElementById('manual-name').value = ''; } }
        window.sm = (m) => { mode = m; ['FRIDGE','FREEZER','PANTRY','SHOP','CHEF'].forEach(t => document.getElementById('t-'+t).classList.toggle('active', t === m)); render(); };

        function isDuplicate(name){
            const key = name.toLowerCase(); const now = Date.now();
            if(recentScans.has(key) && now - recentScans.get(key) < 30000) return true;
            recentScans.set(key, now); return false;
        }

        function pauseScanning(){ if(scanLoop){ clearInterval(scanLoop); scanLoop = null; } scanPaused = true; sBtn.innerText = "⏸️ Warten..."; }
        function resumeScanning(){ scanPaused = false; if(!scanLoop && camStream){ scanLoop = setInterval(()=>analyze(true), 2500); sBtn.innerText = "Dauerscan STOP"; } }

        async function showFeedback(items){
            pauseScanning();
            const box = document.getElementById('scan-feedback'); box.innerHTML = ''; box.style.display = 'flex';
            for(const it of items){
                const hasMHD = it.mhd && it.mhd !== '?' && /\d{2}\.\d{2}\.\d{4}/.test(it.mhd);
                const div = document.createElement('div'); div.className = 'check-item';
                div.innerHTML = `<div class="${hasMHD?'check-ok':'check-warn'}">${hasMHD?'✓':'!'}</div><div><b>${it.name}</b></div>`;
                box.appendChild(div);
                if(!hasMHD && !isDuplicate(it.name + "_asked")){
                    const neu = prompt(`MHD für "${it.name}"?`);
                    if(neu) it.mhd = neu;
                }
            }
            setTimeout(()=>{ box.style.display='none'; resumeScanning(); }, 1200);
        }

        const v = document.getElementById('v'), sBtn = document.getElementById('sBtn'), stopBtn = document.getElementById('stopBtn'), laser = document.getElementById('laser');
        function toggleCamera() {
            if(!camStream) {
                navigator.mediaDevices.getUserMedia({video:{facingMode:'environment', width:{ideal:1920}}})
                .then(s=>{ camStream=v.srcObject=s; v.style.display="block"; document.getElementById('p-text').style.display="none"; sBtn.innerText="Jetzt Scannen"; stopBtn.style.display="block"; });
            } else {
                if(scanLoop){ clearInterval(scanLoop); scanLoop=null; sBtn.innerText="Jetzt Scannen"; laser.style.display="none"; }
                else { analyze(true); scanLoop=setInterval(()=>analyze(true), 3500); sBtn.innerText="Dauerscan STOP"; }
            }
        }
        function stopCam() { if(scanLoop) clearInterval(scanLoop); if (camStream) camStream.getTracks().forEach(t => t.stop()); camStream = null; v.style.display = "none"; stopBtn.style.display = "none"; sBtn.innerText = "Kamera Starten"; }

        async function analyze(multi = false) {
            if(scanPaused) return; laser.style.display = "block";
            const shots = [];
            for (let i=0;i<3;i++){
                const can = document.createElement('canvas'); can.width = 1024; can.height = 1024;
                can.getContext('2d').drawImage(v, 0, 0, 1024, 1024);
                shots.push({type:"image_url", image_url:{url: can.toDataURL('image/jpeg',0.7)}});
                await new Promise(r=>setTimeout(r,400));
            }
            try {
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GRK}` },
                    body: JSON.stringify({
                        model: "meta-llama/llama-4-scout-17b-16e-instruct",
                        messages: [{ role: "system", content: "Antworte NUR JSON." },
                        { role: "user", content: [{ type: "text", text: "Erkenne ALLES. JSON: {\"products\":[{\"name\":\"...\",\"anzahl\":1,\"mhd\":\"?\"}]}" }, ...shots] }],
                        response_format: { type: "json_object" }, temperature: 0
                    })
                });
                const j = await r.json(); const items = JSON.parse(j.choices[0].message.content).products || [];
                if(items.length) {
                    await showFeedback(items);
                    for(let it of items){
                        const id = "SCAN" + Date.now();
                        await push("add", it.name, it.anzahl, it.mhd, id);
                        log("✅ Cloud: " + it.name);
                    }
                }
            } catch(e) { log("API Fehler.", true); }
            laser.style.display = "none";
        }

        async function runKaroChef() {
            const i = document.getElementById('chef-input').value; const inv = stock.map(s => s.name).join(", ");
            try {
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST", headers: { "Authorization": `Bearer ${GRK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: `Kühlschrank: [${inv}]. Wunsch: "${i}". Nenne Rezept & Preise.` }] })
                });
                const j = await r.json(); document.getElementById('chef-out').innerText = j.choices[0].message.content;
            } catch(e) { document.getElementById('chef-out').innerText = "KI Fehler."; }
        }

        function exportList() {
            const sl = stock.filter(i => i.zone === 'SHOP');
            let txt = "🛒 Liste:\n" + sl.map(i => `- ${i.qty}x ${i.name}`).join("\n");
            if(navigator.share) navigator.share({ text: txt }); else alert("Exportiert!");
        }

        function toggleSmartEntnahme() {
            const btn = document.getElementById('voice-trigger-btn');
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = "de-DE"; rec.onstart = () => { btn.style.background = "red"; };
            rec.onresult = async (e) => {
                const t = e.results[0][0].transcript;
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST", headers: { "Authorization": `Bearer ${GRK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: `Lösche laut: "${t}" aus ${JSON.stringify(stock)}. JSON: { "remove": [ { "id": "ID" } ] }` }], response_format: { type: "json_object" } })
                });
                const j = await r.json(); const updates = JSON.parse(j.choices[0].message.content).remove;
                for(let u of updates) { await push("delete", "", 0, "", u.id); }
            };
            rec.onend = () => { btn.style.background = ""; }; rec.start();
        }
        const log = (m, isE=false) => { term.innerHTML += `<br><span style="color:${isE?'red':''}">> ${m}</span>`; term.scrollTop = term.scrollHeight; };
    </script>
</body>
</html>
