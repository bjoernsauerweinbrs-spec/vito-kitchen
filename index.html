<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VITO DIAGNOSTIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .error-log { color: #ff4b4b; font-family: monospace; font-size: 10px; padding: 20px; border: 1px solid #333; margin: 20px; border-radius: 10px; background: #110000; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="debug-display" class="hidden">
        <h2 class="text-red-500 font-black p-5 uppercase">Tactical Error Detected:</h2>
        <div id="error-content" class="error-log"></div>
    </div>

    <div id="main-app" class="p-4 opacity-0 transition-opacity duration-500">
        <header class="flex justify-between items-start mb-8 border-l-4 border-[#00f2ff] pl-4 mt-4">
            <div>
                <h1 class="text-2xl font-black italic uppercase leading-none">NABY KEÏTA <br><span class="text-[#00f2ff]">COMMAND</span></h1>
                <p class="text-[8px] text-gray-500 font-bold uppercase tracking-[0.3em] mt-1">BAD HERSFELD | DIAGNOSTIC V50.1</p>
            </div>
            <div class="text-right glass p-3 rounded-2xl">
                <div id="status" class="text-[9px] font-black uppercase text-red-500">BOOTING ●</div>
                <div id="temp" class="text-xl font-black italic">4.0°C</div>
            </div>
        </header>

        <div class="glass p-10 rounded-[2.5rem] text-center text-gray-500 uppercase font-black text-[10px] tracking-widest">
            Initialisiere taktische Schnittstelle...
        </div>
    </div>

    <script>
        // ERROR CATCHER: Schreibt Fehler direkt auf die Website
        window.onerror = function(msg, url, line) {
            document.getElementById('debug-display').classList.remove('hidden');
            document.getElementById('error-content').innerText = "MSG: " + msg + "\nLINE: " + line;
            return false;
        };

        console.log("VITO: Startet System-Check...");

        const fbConfig = { 
            apiKey: "AIzaSyDqqn39l6M8r-YC-R5utkwfG4En2OfUnpQ", 
            authDomain: "gen-lang-client-0348637849.firebaseapp.com", 
            projectId: "gen-lang-client-0348637849", 
            storageBucket: "gen-lang-client-0348637849.firebasestorage.app", 
            messagingSenderId: "1008937513696", 
            appId: "1:1008937513696:web:1c0a2bc7792daf689a5685" 
        };

        try {
            firebase.initializeApp(fbConfig);
            const db = firebase.firestore();
            console.log("VITO: Firebase verbunden.");

            // Wenn alles okay ist, App einblenden
            setTimeout(() => {
                document.getElementById('main-app').classList.remove('opacity-0');
                document.getElementById('status').innerText = "Online ●";
                document.getElementById('status').classList.remove('text-red-500');
                document.getElementById('status').classList.add('text-green-500');
                
                // Hier den Key abfragen, falls nicht da
                if (!localStorage.getItem('GRK')) {
                    const key = prompt("VITO LOGIN: Groq API Key eingeben:");
                    if (key) localStorage.setItem('GRK', key.trim());
                }
            }, 1000);

        } catch (e) {
            document.getElementById('debug-display').classList.remove('hidden');
            document.getElementById('error-content').innerText = "FIREBASE INIT ERROR: " + e.message;
        }
    </script>
</body>
</html>
