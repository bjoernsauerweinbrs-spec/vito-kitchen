<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>GERD 2.0 | THE LEGACY</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --gold-l: #f9f295; --gold-d: #b88a44; --neon: #00f2ff; --bg: #010101; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 15px; overflow-x: hidden; background-image: radial-gradient(circle at 50% 0%, #151515 0%, #010101 100%); }

        /* GATEKEEPER */
        #gatekeeper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box; }
        .gk-title { font-size: 38px; font-weight: 900; font-style: italic; text-transform: uppercase; background: linear-gradient(to bottom, var(--gold-l) 0%, var(--gold) 40%, var(--gold-d) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .gk-input { width: 100%; max-width: 400px; background: #111; border: 2px solid var(--gold); padding: 18px; border-radius: 12px; color: #fff; font-size: 16px; text-align: center; outline: none; margin-bottom: 20px; font-family: monospace; }
        .gk-btn { width: 100%; max-width: 400px; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-d) 100%); border: none; padding: 20px; border-radius: 12px; color: #000; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; }

        /* DASHBOARD */
        #main-app { display: none; }
        .legacy-branding { text-align: center; margin: 10px 0 25px 0; }
        .gold-brand { font-size: 28px; font-weight: 900; font-style: italic; text-transform: uppercase; background: linear-gradient(to bottom, var(--gold-l) 0%, var(--gold) 40%, var(--gold-d) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .nav-hub { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 20px; }
        .nav-node { background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.2); padding: 12px 0; border-radius: 10px; text-align: center; cursor: pointer; }
        .nav-node.active { background: var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.4); }
        .nav-node.active span { color: #000; font-weight: 900; }
        .nav-node span { font-size: 7px; text-transform: uppercase; display: block; margin-top: 5px; color: #888; }

        .scouter-frame { background: rgba(255,255,255,0.02); border: 1px solid rgba(0,242,255,0.2); border-radius: 20px; padding: 15px; position: relative; margin-bottom: 20px; }
        .viewport { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 15px; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .laser { position: absolute; width: 100%; height: 3px; background: var(--neon); top: 0; animation: scan 2s linear infinite; display: none; box-shadow: 0 0 15px var(--neon); z-index: 100; }
        @keyframes scan { from { top: 0%; } to { top: 100%; } }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .cmd-btn { width: 100%; background: var(--gold); border: none; padding: 16px; border-radius: 12px; color: #000; font-weight: 900; text-transform: uppercase; font-size: 11px; cursor: pointer; }
        .stop-btn { background: #333; color: #fff; border: 1px solid #555; display: none; }
        
        .voice-btn { width: 100%; background: rgba(0,242,255,0.1); border: 1px solid var(--neon); padding: 15px; border-radius: 12px; color: var(--neon); font-weight: 900; text-transform: uppercase; font-size: 12px; cursor: pointer; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .voice-btn:active { background: var(--neon); color: #000; }

        .data-card { background: rgba(255,255,255,0.02); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); min-height: 150px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #111; }
        .row-info { display: flex; flex-direction: column; }
        .row-name { color: var(--gold); font-size: 14px; text-transform: uppercase; font-style: italic; font-weight: 900; }
        .row-meta { font-family: monospace; font-size: 10px; color: var(--neon); margin-top: 3px; }
        .qty-badge { background: #333; color: #fff; padding: 3px 8px; border-radius: 5px; font-size: 12px; margin-right: 10px; font-weight: bold; border: 1px solid var(--gold); }
        
        /* CHEF & SHOP UI */
        .ai-panel { display: none; margin-bottom: 20px; background: rgba(0, 242, 255, 0.05); border: 1px solid var(--neon); border-radius: 15px; padding: 15px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .chef-input { flex: 1; background: #000; border: 1px solid var(--neon); color: #fff; padding: 12px; border-radius: 8px; outline: none; }
        .ai-out { margin-top: 15px; font-size: 12px; color: var(--neon); font-style: italic; white-space: pre-wrap; line-height: 1.5; }

        .terminal { background: #000; border: 1px solid #333; border-radius: 10px; padding: 10px; font-family: monospace; font-size: 9px; color: #00f2ff; height: 60px; overflow-y: auto; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="gk-title">GERD 2.0</div>
        <input type="text" id="api-input" class="gk-input" placeholder="Groq Key (gsk_...)">
        <button onclick="saveKey()" class="gk-btn">SYSTEM FREISCHALTEN</button>
    </div>

    <div id="main-app">
        <div class="legacy-branding">
            <span class="gold-brand">Gerd 2.0 – The Legacy</span>
        </div>

        <nav class="nav-hub">
            <div onclick="sm('FRIDGE')" id="t-FRIDGE" class="nav-node active">❄️<span>Kühl</span></div>
            <div onclick="sm('FREEZER')" id="t-FREEZER" class="nav-node">🧊<span>Frost</span></div>
            <div onclick="sm('PANTRY')" id="t-PANTRY" class="nav-node">📦<span>Vorrat</span></div>
            <div onclick="sm('SHOP')" id="t-SHOP" class="nav-node">🛒<span>Kauf</span></div>
            <div onclick="sm('CHEF')" id="t-CHEF" class="nav-node">👨‍🍳<span>Chef</span></div>
        </nav>

        <div id="ui-scouter" class="scouter-frame">
            <div class="viewport">
                <div id="laser" class="laser"></div>
                <video id="v" autoplay playsinline muted style="display:none;"></video>
                <div id="p-text" style="padding-top:45%; text-align:center; color:#222; font-weight:900; letter-spacing:4px;">CAMERA STANDBY</div>
            </div>
            <div class="btn-grid">
                <button id="sBtn" onclick="toggleCamera()" class="cmd-btn">Kamera Starten</button>
                <button id="stopBtn" onclick="stopCam()" class="cmd-btn stop-btn">Kamera Stop</button>
            </div>
        </div>

        <div id="ui-chef" class="ai-panel">
            <div class="input-group">
                <input type="text" id="chef-input" class="chef-input" placeholder="Was kochen wir?">
                <button onclick="startDictation('chef-input')" style="border-radius:8px; border:none; padding:0 10px; font-size:16px;">🎙️</button>
            </div>
            <button onclick="runChefAI()" class="cmd-btn" style="background:var(--neon);">Check & Plan</button>
            <div id="chef-out" class="ai-out"></div>
        </div>

        <div id="ui-shop" class="ai-panel">
            <button onclick="runShopAI()" class="cmd-btn" style="background:var(--neon);">Bad Hersfeld Strategie</button>
            <div id="shop-out" class="ai-out"></div>
        </div>

        <button onclick="smartEntnahme()" class="voice-btn">🎙️ Smarte Entnahme (Sprechen)</button>

        <div class="data-card">
            <div id="l-content"></div>
        </div>

        <div class="terminal" id="term">> System online...</div>
    </div>

    <script>
        const term = document.getElementById('term');
        const log = (m, isE=false) => { term.innerHTML += `<br><span class="${isE?'err':''}">> ${m}</span>`; term.scrollTop = term.scrollHeight; };

        const cfg = { apiKey: "AIzaSyDqqn39l6M8r-YC-R5utkwfG4En2OfUnpQ", authDomain: "gen-lang-client-0348637849.firebaseapp.com", projectId: "gen-lang-client-0348637849", storageBucket: "gen-lang-client-0348637849.firebasestorage.app", messagingSenderId: "1008937513696", appId: "1:1008937513696:web:1c0a2bc7792daf689a5685" };

        let GRK = localStorage.getItem('GRK'), mode = 'FRIDGE', stock = [], db;

        if (GRK && GRK.startsWith('gsk_')) {
            document.getElementById('gatekeeper').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            initFirebase();
        }

        function saveKey() {
            const input = document.getElementById('api-input').value.trim();
            if (input.startsWith('gsk_')) {
                localStorage.setItem('GRK', input); GRK = input;
                document.getElementById('gatekeeper').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                initFirebase();
            }
        }

        function initFirebase() {
            if (!firebase.apps.length) firebase.initializeApp(cfg);
            db = firebase.firestore();
            db.collection("inventory").orderBy("addedAt", "desc").onSnapshot(s => {
                stock = s.docs.map(d => ({id: d.id, ...d.data()}));
                render();
            });
        }

        function render() {
            const cont = document.getElementById('l-content');
            const filtered = stock.filter(i => i.zone === mode);
            document.getElementById('ui-scouter').style.display = (mode === 'CHEF' || mode === 'SHOP' ? 'none' : 'block');
            document.getElementById('ui-chef').style.display = (mode === 'CHEF' ? 'block' : 'none');
            document.getElementById('ui-shop').style.display = (mode === 'SHOP' ? 'block' : 'none');
            
            cont.innerHTML = filtered.map(i => `
                <div class="row">
                    <div style="display:flex; align-items:center;">
                        <span class="qty-badge">${i.qty || 1}x</span>
                        <div class="row-info">
                            <span class="row-name">${i.name}</span>
                            <span class="row-meta">MHD: ${i.mhd || 'Nicht erkannt'}</span>
                        </div>
                    </div>
                    <span onclick="del('${i.id}')" style="color:red; cursor:pointer; font-size:24px;">×</span>
                </div>
            `).join('') || '<div style="text-align:center; padding:20px; color:#111; font-weight:900;">HUB EMPTY</div>';
        }

        async function del(id) { if(confirm("Eintrag komplett löschen?")) await db.collection("inventory").doc(id).delete(); }

        window.sm = (m) => { mode = m; render(); };

        // --- KAMERA ---
        const v = document.getElementById('v'), sBtn = document.getElementById('sBtn'), stopBtn = document.getElementById('stopBtn'), laser = document.getElementById('laser');
        let camActive = false;

        async function toggleCamera() {
            if(!camActive) {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    v.srcObject = s; v.style.display = "block";
                    document.getElementById('p-text').style.display = "none";
                    camActive = true; sBtn.innerText = "Scan Auslösen"; stopBtn.style.display = "block";
                    log("Kamera bereit.");
                } catch(e) { log("Kamera blockiert.", true); }
            } else {
                analyze();
            }
        }

        function stopCam() {
            if (v.srcObject) { v.srcObject.getTracks().forEach(t => t.stop()); v.srcObject = null; }
            v.style.display = "none"; document.getElementById('p-text').style.display = "block";
            camActive = false; sBtn.innerText = "Kamera Starten"; stopBtn.style.display = "none";
            log("Kamera ausgeschaltet.");
        }

        // --- SMART SCAN (AGGREGATION & MHD) ---
        async function analyze() {
            sBtn.disabled = true; sBtn.innerText = "Analysiere..."; laser.style.display = "block";
            const can = document.createElement('canvas'); can.width = 1024; can.height = 1024;
            can.getContext('2d').drawImage(v, 0, 0, 1024, 1024);
            
            try {
                log("Suche Produkte, Anzahl & MHD...");
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GRK}` },
                    body: JSON.stringify({
                        model: "meta-llama/llama-4-scout-17b-16e-instruct",
                        messages: [{ role: "user", content: [
                            { type: "text", text: "Zähle die Produkte auf dem Bild. Lies auch das Ablaufdatum (MHD) ab, falls sichtbar. Benutze kurze Standardnamen (z.B. 'Schmand', 'Joghurt'). Gib NUR JSON zurück: { 'products': [{ 'name': 'Produkt', 'anzahl': 2, 'mhd': '12.05.' }] }" },
                            { type: "image_url", image_url: { url: can.toDataURL('image/jpeg', 0.9) } }
                        ]}],
                        response_format: { type: "json_object" }
                    })
                });
                
                const j = await r.json();
                const items = JSON.parse(j.choices[0].message.content).products;
                
                for(let item of items) {
                    let qty = parseInt(item.anzahl) || 1;
                    let mhd = item.mhd || "Unbekannt";
                    let n = item.name;

                    // SMART STACKING (Prüfe ob Artikel schon existiert)
                    let exist = stock.find(i => i.name.toLowerCase() === n.toLowerCase() && i.zone === mode);
                    
                    if(exist) {
                        await db.collection("inventory").doc(exist.id).update({ qty: (exist.qty || 1) + qty, mhd: mhd });
                        log(`Aggregiert: ${qty}x ${n} (Gesamt: ${(exist.qty||1)+qty})`);
                    } else {
                        await db.collection("inventory").add({ name: n, qty: qty, mhd: mhd, zone: mode, addedAt: firebase.firestore.FieldValue.serverTimestamp() });
                        log(`Neu erfasst: ${qty}x ${n}`);
                    }
                    window.speechSynthesis.speak(new SpeechSynthesisUtterance(qty + " mal " + n + " registriert"));
                }
            } catch(e) { log("KI Fehler beim Scannen.", true); }
            
            sBtn.disabled = false; sBtn.innerText = "Scan Auslösen"; laser.style.display = "none";
        }

        // --- SMARTE ENTNAHME (VOICE) ---
        function startDictation(targetId = null) {
            if (window.hasOwnProperty('webkitSpeechRecognition')) {
                const recognition = new webkitSpeechRecognition();
                recognition.continuous = false; recognition.interimResults = false; recognition.lang = "de-DE";
                recognition.start(); log("Mikrofon aktiv...");
                recognition.onresult = function(e) { 
                    const t = e.results[0][0].transcript;
                    if(targetId) { document.getElementById(targetId).value = t; log("Spracheingabe: " + t); }
                    else { processVoiceRemoval(t); }
                };
                recognition.onerror = function(e) { log("Mikrofon-Fehler.", true); }
            } else { alert("Browser unterstützt kein Mikrofon."); }
        }

        function smartEntnahme() { startDictation(); }

        async function processVoiceRemoval(text) {
            log(`Entnahmebefehl: "${text}"`);
            const invJson = JSON.stringify(stock.map(i => ({ id: i.id, name: i.name, qty: i.qty || 1 })));
            const prompt = `Aktuelles Inventar: ${invJson}. Der Nutzer sagt: "${text}". Analysiere, was entnommen wurde. Antworte NUR als JSON: { "remove": [ { "id": "db-id", "qty_to_remove": 1 } ] }. Wenn nichts passt, lass das Array leer.`;

            try {
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST", headers: { "Authorization": `Bearer ${GRK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: prompt }], response_format: { type: "json_object" } })
                });
                const j = await r.json();
                const updates = JSON.parse(j.choices[0].message.content).remove;

                if(!updates || updates.length === 0) { log("Keine passenden Artikel gefunden."); return; }

                for(let u of updates) {
                    let item = stock.find(i => i.id === u.id);
                    if(item) {
                        let newQty = (item.qty || 1) - u.qty_to_remove;
                        if(newQty <= 0) {
                            await db.collection("inventory").doc(u.id).delete();
                            log(`${item.name} komplett verbraucht.`);
                        } else {
                            await db.collection("inventory").doc(u.id).update({ qty: newQty });
                            log(`${item.name} reduziert auf ${newQty}.`);
                        }
                    }
                }
                window.speechSynthesis.speak(new SpeechSynthesisUtterance("Bestand aktualisiert."));
            } catch(e) { log("Fehler bei Entnahme.", true); }
        }

        // --- CHEF & SHOP KI ---
        async function fetchGroqLogic(prompt, outputElementId) {
            const out = document.getElementById(outputElementId); out.innerText = "Taktiktafel lädt...";
            try {
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST", headers: { "Authorization": `Bearer ${GRK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: prompt }] })
                });
                const j = await r.json(); out.innerText = j.choices[0].message.content;
            } catch(e) { out.innerText = "Verbindungsfehler."; }
        }

        function runChefAI() {
            const dish = document.getElementById('chef-input').value.trim();
            if(!dish) return alert("Bitte Gericht eingeben!");
            const inv = stock.filter(i => i.zone === 'FRIDGE' || i.zone === 'PANTRY').map(i => `${i.qty||1}x ${i.name}`).join(", ");
            const prompt = `Gericht: "${dish}". Vorrat: ${inv}. Liste nötige Zutaten, prüfe Bestand, schreibe klaren Einkaufszettel. Hinweis für Nutzer: Danach einfach per Sprachbefehl "Habe ${dish} gekocht" sagen, um Bestand automatisch abzubuchen.`;
            fetchGroqLogic(prompt, 'chef-out');
        }

        function runShopAI() {
            const shopList = stock.filter(i=>i.zone==='SHOP').map(i=>`${i.qty||1}x ${i.name}`).join(", ");
            if(!shopList) return alert("Einkaufsliste leer!");
            const prompt = `Kaufliste: ${shopList}. Welcher Supermarkt in Bad Hersfeld (Lidl Friedloser Str, Aldi, Rewe) ist dafür am besten? Gib Empfehlungen.`;
            fetchGroqLogic(prompt, 'shop-out');
        }
    </script>
</body>
</html>
