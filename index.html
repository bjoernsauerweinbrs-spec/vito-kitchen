<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VITO MASTERMIND V80</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --neon: #00f2ff; --gold: #d4af37; --bg: #050505; --card: rgba(255,255,255,0.03); }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin: 15px 0 25px; border-left: 4px solid var(--neon); padding-left: 15px; }
        .header h1 { margin: 0; font-size: 22px; font-style: italic; text-transform: uppercase; letter-spacing: -1px; }
        .status-led { font-size: 9px; font-weight: 900; color: #00ff41; text-transform: uppercase; letter-spacing: 1px; }

        /* MULTI-TAB NAVIGATION */
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; gap: 4px; margin-bottom: 20px; }
        .nav-btn { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 12px 0; color: #444; font-size: 7px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .nav-active { background: var(--neon) !important; color: #000 !important; border: none; font-weight: 900; }
        .nav-chef { background: rgba(212,175,55,0.1); color: var(--gold); }
        .nav-active-chef { background: var(--gold) !important; color: #000 !important; }

        /* SCOUTER UNIT */
        .scouter { background: var(--card); border-radius: 2rem; padding: 15px; border: 1px solid rgba(0,242,255,0.1); margin-bottom: 20px; }
        .viewport { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 1.5rem; overflow: hidden; position: relative; border: 1px solid #111; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .laser { position: absolute; width: 100%; height: 2px; background: var(--neon); top: 0; animation: scan 2s linear infinite; z-index: 10; display: none; box-shadow: 0 0 15px var(--neon); }
        @keyframes scan { from { top: 0%; } to { top: 100%; } }
        
        .action-btn { width: 100%; background: var(--neon); color: #000; border: none; padding: 18px; border-radius: 1.2rem; font-weight: 900; font-size: 13px; text-transform: uppercase; margin-top: 15px; cursor: pointer; }

        /* CONTENT CARDS */
        .card { background: var(--card); border-radius: 2rem; padding: 20px; border: 1px solid rgba(255,255,255,0.03); min-height: 300px; }
        .card-h { color: var(--gold); font-size: 11px; font-weight: 900; text-transform: uppercase; border-bottom: 1px solid #111; padding-bottom: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; }
        
        .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #0d0d0d; }
        .row b { font-style: italic; text-transform: uppercase; font-size: 13px; letter-spacing: -0.5px; }
        .tag { font-family: monospace; font-size: 10px; color: var(--gold); background: rgba(212,175,55,0.1); padding: 3px 8px; border-radius: 5px; }
        .del { color: #ff3e3e; font-size: 20px; padding-left: 15px; cursor: pointer; }

        /* AI ADVISOR BOX */
        .ai-box { background: rgba(0,242,255,0.05); border: 1px solid var(--neon); border-radius: 1.5rem; padding: 15px; margin-top: 15px; font-size: 12px; line-height: 1.5; color: #00f2ff; font-style: italic; }
        
        .chef-choice { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 15px; }
        .chef-btn { background: #111; border: 1px solid #333; color: #666; font-size: 8px; padding: 10px 0; border-radius: 8px; text-transform: uppercase; font-weight: bold; }
        .chef-active { border-color: var(--gold); color: var(--gold); }
    </style>
</head>
<body>

    <header class="header">
        <div>
            <h1>NABY KEÏTA <span style="color:var(--neon)">HUB</span></h1>
            <div style="font-size:7px; color:#444; letter-spacing:3px; text-transform:uppercase;">Mastermind V80.0 | Bad Hersfeld</div>
        </div>
        <div class="status-pill">
            <div id="led" class="status-led">Syncing ●</div>
            <div style="font-weight:900; font-style:italic; font-size:18px;">4.0°C</div>
        </div>
    </header>

    <nav class="nav-grid">
        <button onclick="sm('FRIDGE')" id="t-FRIDGE" class="nav-btn nav-active">Kühl</button>
        <button onclick="sm('FREEZER')" id="t-FREEZER" class="nav-btn">Frost</button>
        <button onclick="sm('PANTRY')" id="t-PANTRY" class="nav-btn">Vorrat</button>
        <button onclick="sm('SHOP')" id="t-SHOP" class="nav-btn">Kauf</button>
        <button onclick="sm('CHEF')" id="t-CHEF" class="nav-btn nav-chef">Chef</button>
    </nav>

    <div id="scouter-ui" class="scouter">
        <div class="viewport">
            <div id="laser" class="laser"></div>
            <video id="v" autoplay playsinline muted style="display:none;"></video>
            <div id="p-text" style="padding-top:45%; color:#151515; font-weight:900; font-size:10px; letter-spacing:4px; text-align:center;">AI SCOUTER ACTIVE</div>
        </div>
        <button id="sBtn" class="action-btn">Einheit erfassen</button>
    </div>

    <div class="card">
        <div class="card-h">
            <span id="c-title">Bestand: Kühl</span>
            <span onclick="localStorage.removeItem('GRK'); location.reload();" style="font-size:7px; color:#222; text-decoration:underline;">RESET KEY</span>
        </div>

        <div id="chef-controls" style="display:none;">
            <div class="chef-choice">
                <button onclick="setTheme('ITALIAN')" id="c-ITALIAN" class="chef-btn chef-active">Italienisch</button>
                <button onclick="setTheme('ASIAN')" id="c-ASIAN" class="chef-btn">Asiatisch</button>
                <button onclick="setTheme('CINEMA')" id="c-CINEMA" class="chef-btn">Kino/Snacks</button>
            </div>
            <button onclick="getStrategy('CHEF')" class="action-btn" style="background:var(--gold); margin-bottom:20px;">Rezept & Plan generieren</button>
        </div>

        <div id="shop-controls" style="display:none;">
            <button onclick="getStrategy('SHOP')" class="action-btn" style="background:var(--neon); margin-bottom:20px;">Preis-Check Bad Hersfeld</button>
        </div>

        <div id="ai-output" class="ai-box" style="display:none;">Warte auf Strategie...</div>

        <div id="l-content"></div>
    </div>

    <script>
        const cfg = { apiKey: "AIzaSyDqqn39l6M8r-YC-R5utkwfG4En2OfUnpQ", authDomain: "gen-lang-client-0348637849.firebaseapp.com", projectId: "gen-lang-client-0348637849", storageBucket: "gen-lang-client-0348637849.firebasestorage.app", messagingSenderId: "1008937513696", appId: "1:1008937513696:web:1c0a2bc7792daf689a5685" };
        let GRK = localStorage.getItem('GRK'), curM = 'FRIDGE', curT = 'ITALIAN', stock = [];

        if(!GRK) { GRK = prompt("Groq Key erforderlich (gsk_...):"); if(GRK) localStorage.setItem('GRK', GRK.trim()); }

        firebase.initializeApp(cfg);
        const db = firebase.firestore();

        db.collection("inventory").orderBy("addedAt", "desc").onSnapshot(s => {
            stock = s.docs.map(d => ({id: d.id, ...d.data()}));
            document.getElementById('led').style.color = "#00ff41";
            document.getElementById('led').innerText = "Hub Live ●";
            render();
        });

        function render() {
            const cont = document.getElementById('l-content');
            const filtered = stock.filter(i => i.zone === curM);
            
            document.getElementById('chef-controls').style.display = (curM === 'CHEF' ? 'block' : 'none');
            document.getElementById('shop-controls').style.display = (curM === 'SHOP' ? 'block' : 'none');
            document.getElementById('scouter-ui').style.display = (curM === 'CHEF' ? 'none' : 'block');

            cont.innerHTML = filtered.map(i => `
                <div class="row">
                    <div class="info"><b>${i.name}</b></div>
                    <div style="display:flex; align-items:center;">
                        <div class="tag">${i.mhd || 'OFFEN'}</div>
                        <div class="del" onclick="del('${i.id}')">×</div>
                    </div>
                </div>
            `).join('') || '<div style="text-align:center; padding:50px; color:#111; font-weight:900; font-size:10px;">BEREIT FÜR ANALYSE</div>';
        }

        async function del(id) { if(confirm("Löschen?")) await db.collection("inventory").doc(id).delete(); }

        window.sm = (m) => {
            curM = m;
            document.getElementById('c-title').innerText = (m === 'SHOP' ? 'Einkauf' : m === 'CHEF' ? 'Strategie' : 'Bestand: ' + m);
            document.getElementById('ai-output').style.display = 'none';
            ['FRIDGE','FREEZER','PANTRY','SHOP','CHEF'].forEach(t => {
                const b = document.getElementById('t-'+t);
                b.classList.toggle('nav-active', t === m);
                if(t==='CHEF') b.classList.toggle('nav-active-chef', t === m);
            });
            render();
        };

        window.setTheme = (t) => {
            curT = t;
            ['ITALIAN','ASIAN','CINEMA'].forEach(id => document.getElementById('c-'+id).classList.toggle('chef-active', id === t));
        };

        async function getStrategy(type) {
            const out = document.getElementById('ai-output');
            out.style.display = 'block';
            out.innerText = "Berechne Strategie für Bad Hersfeld...";
            
            const inventoryText = stock.map(i => i.name).join(", ");
            const prompt = type === 'CHEF' 
                ? `Du bist der Naby Keïta Chef. Thema: ${curT}. Vorrat: ${inventoryText}. Erstelle ein kurzes Rezept und sage genau, was Nadine noch bei Lidl/Aldi/Edeka in Bad Hersfeld kaufen muss.`
                : `Analysiere die Einkaufsliste: ${inventoryText.filter(i => i.zone === 'SHOP')}. Wer hat in Bad Hersfeld (Lidl Friedloser Str, Aldi Nord, REWE Erfurter Str) gerade die besten Preise dafür? Gib eine kurze Empfehlung.`;

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GRK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.2-11b-vision-preview",
                        messages: [{ role: "user", content: prompt }]
                    })
                });
                const j = await res.json();
                out.innerText = j.choices[0].message.content;
            } catch(e) { out.innerText = "Strategie-Fehler. Key prüfen!"; }
        }

        // SCANNER
        const v = document.getElementById('v'), sBtn = document.getElementById('sBtn');
        let cam = false;

        sBtn.onclick = async () => {
            if(!cam) {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                v.srcObject = s; v.style.display = "block";
                document.getElementById('p-text').style.display = "none";
                cam = true; sBtn.innerText = "EINHEIT ANALYSIEREN";
            } else {
                analyze();
            }
        };

        async function analyze() {
            sBtn.disabled = true; sBtn.innerText = "KI PRÜFT...";
            document.getElementById('laser').style.display = "block";
            const can = document.createElement('canvas'); can.width = 640; can.height = 640;
            can.getContext('2d').drawImage(v, 0, 0, 640, 640);
            
            try {
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GRK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.2-11b-vision-preview",
                        messages: [{ role: "user", content: [
                            { type: "text", text: "JSON ONLY: { 'name': 'Produkt', 'mhd': 'MHD' }" },
                            { type: "image_url", image_url: { url: can.toDataURL('image/jpeg', 0.6) } }
                        ]}]
                    })
                });
                const j = await r.json();
                const d = JSON.parse(j.choices[0].message.content.match(/\{.*\}/s)[0]);
                await db.collection("inventory").add({ ...d, zone: curM, addedAt: firebase.firestore.FieldValue.serverTimestamp() });
                if(navigator.vibrate) navigator.vibrate(100);
                window.speechSynthesis.speak(new SpeechSynthesisUtterance("Check: " + d.name));
            } catch(e) { console.error(e); }
            sBtn.disabled = false; sBtn.innerText = "EINHEIT ANALYSIEREN";
            document.getElementById('laser').style.display = "none";
        }
    </script>
</body>
</html>
