<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VITO KITCHEN COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .neon-text { color: #00f2ff; text-shadow: 0 0 10px rgba(0,242,255,0.5); }
        .status-blink { animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .zone-active { background-color: #d4af37 !important; color: #000 !important; font-weight: 900; }
    </style>
</head>
<body class="p-4 bg-black">

    <header class="flex justify-between items-start mb-6">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter">VITO <span class="neon-text">COMMAND</span></h1>
            <p class="text-[9px] text-gray-600 font-bold uppercase">Bad Hersfeld | Elite System</p>
        </div>
        <div class="text-right bg-[#111] p-3 rounded-2xl border border-gray-800">
            <div id="dbStatus" class="text-[10px] font-bold uppercase text-gray-700">Connecting ●</div>
            <div class="text-lg font-bold text-white">4.0°C</div>
        </div>
    </header>

    <div class="bg-[#111] p-5 rounded-[2rem] border border-[#00f2ff]/10 mb-4 text-center">
        <button id="vBtn" class="w-14 h-14 bg-[#222] rounded-full text-xl border border-gray-800 active:bg-[#00f2ff] transition-all">🎙️</button>
        <p class="text-[10px] text-gray-500 mt-2 italic uppercase tracking-widest">System Bereit</p>
    </div>

    <div class="flex gap-1 mb-4">
        <button onclick="setZone('FRIDGE')" id="z-FRIDGE" class="zone-active flex-1 py-3 bg-[#111] text-[10px] rounded-xl uppercase transition-all text-gray-500">🧊 Kühl</button>
        <button onclick="setZone('FREEZER')" id="z-FREEZER" class="flex-1 py-3 bg-[#111] text-gray-500 text-[10px] rounded-xl uppercase transition-all">❄️ Frost</button>
        <button onclick="setZone('PANTRY')" id="z-PANTRY" class="flex-1 py-3 bg-[#111] text-gray-500 text-[10px] rounded-xl uppercase transition-all">📦 Vorrat</button>
    </div>

    <div class="bg-[#111] p-5 rounded-[2rem] border border-gray-800 mb-4">
        <div class="relative w-full aspect-video bg-black rounded-2xl overflow-hidden border border-gray-900 flex items-center justify-center">
            <video id="v" autoplay playsinline muted class="hidden w-full h-full object-cover"></video>
            <canvas id="canvas" class="hidden"></canvas>
            <div id="placeholder" class="text-[10px] text-gray-700 font-bold uppercase text-center p-4">Kamera Standby</div>
        </div>
        <button id="sBtn" class="w-full py-4 mt-4 bg-[#00f2ff] text-black font-black rounded-2xl uppercase shadow-lg text-sm active:scale-95 transition-all">Scanner aktivieren</button>
    </div>

    <div class="bg-[#111] p-5 rounded-[2rem] border border-gray-800 mb-20">
        <div class="flex justify-between items-center mb-4">
            <h3 id="zoneTitle" class="text-[10px] font-bold text-[#d4af37] uppercase">Bestand: Kühl</h3>
            <button onclick="window.open('https://keep.google.com/')" class="text-[8px] border border-[#00f2ff] text-[#00f2ff] px-2 py-1 rounded font-bold uppercase">Keep Sync</button>
        </div>
        <div id="invList" class="space-y-3 text-sm text-gray-300">
            <p class="text-center py-4 italic text-gray-800">Lade Inventar...</p>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE KONFIGURATION (KORRIGIERT) ---
        const firebaseConfig = {
            apiKey: "AIzaSyDqqn39l6M8r-YC-R5utkwfG4En2OfUnpQ",
            authDomain: "gen-lang-client-0348637849.firebaseapp.com",
            projectId: "gen-lang-client-0348637849",
            storageBucket: "gen-lang-client-0348637849.firebasestorage.app",
            messagingSenderId: "1008937513696",
            appId: "1:1008937513696:web:1c0a2bc7792daf689a5685"
        };

        // --- 2. GROQ KEY (KORRIGIERT) ---
        const GROQ_KEY = "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";

        // Initialisierung
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentZone = 'FRIDGE';
        let isCamOn = false;

        const video = document.getElementById('v');
        const sBtn = document.getElementById('sBtn');
        const invList = document.getElementById('invList');
        const dbStatus = document.getElementById('dbStatus');

        function sync() {
            db.collection("inventory").where("zone", "==", currentZone).orderBy("addedAt", "desc").onSnapshot(snap => {
                dbStatus.innerText = "Online ●";
                dbStatus.className = "text-[10px] font-bold uppercase text-[#00ff41] status-blink";
                invList.innerHTML = snap.docs.map(doc => `
                    <div class="flex justify-between items-center py-3 border-b border-gray-900">
                        <span class="font-bold text-white uppercase text-xs">${doc.data().name}</span>
                        <span class="text-[10px] text-gray-600 font-mono">${doc.data().mhd || 'OFFEN'}</span>
                    </div>
                `).join('') || '<p class="text-center py-4 text-gray-800 italic text-xs">Zone leer</p>';
            }, err => {
                dbStatus.innerText = "Sync Error X";
                dbStatus.className = "text-[10px] font-bold uppercase text-red-600";
            });
        }
        sync();

        sBtn.addEventListener('click', async () => {
            if (!isCamOn) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    video.srcObject = stream;
                    video.classList.remove('hidden');
                    document.getElementById('placeholder').classList.add('hidden');
                    sBtn.innerText = "Einheit analysieren";
                    isCamOn = true;
                } catch (e) { alert("Kamera-Fehler"); }
            } else {
                analyze();
            }
        });

        async function analyze() {
            sBtn.disabled = true;
            sBtn.innerText = "VITO ANALYSIERT...";
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.2-11b-vision-preview",
                        messages: [{ role: "user", content: [
                            { type: "text", text: "JSON: { 'name': '...', 'mhd': '...' }" },
                            { type: "image_url", image_url: { url: canvas.toDataURL('image/jpeg') } }
                        ]}],
                        response_format: { type: "json_object" }
                    })
                });
                const json = await res.json();
                const data = JSON.parse(json.choices[0].message.content);
                await db.collection("inventory").add({
                    ...data,
                    zone: currentZone,
                    addedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                if(navigator.vibrate) navigator.vibrate(100);
            } catch (e) { alert("KI-Kommunikation fehlgeschlagen."); }
            sBtn.disabled = false;
            sBtn.innerText = "Einheit analysieren";
        }

        window.setZone = (z) => {
            currentZone = z;
            document.getElementById('zoneTitle').innerText = "Bestand: " + (z=='FRIDGE'?'Kühl':z=='FREEZER'?'Frost':'Vorrat');
            ['FRIDGE','FREEZER','PANTRY'].forEach(id => {
                document.getElementById('z-'+id).classList.toggle('zone-active', id === z);
            });
            sync();
        };

        document.getElementById('vBtn').addEventListener('click', () => {
            const t = "VITO System online. Nadine, alles ist bereit.";
            const s = new SpeechSynthesisUtterance(t);
            s.lang = 'de-DE';
            window.speechSynthesis.speak(s);
        });
    </script>
</body>
</html>
