<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VITO V59 FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        /* ABSOLUT STABILES DESIGN */
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .box { border: 2px solid #ffee00; border-radius: 20px; padding: 20px; background: #0a0a0a; margin-bottom: 20px; }
        .neon-yellow { color: #ffee00; font-weight: 900; text-transform: uppercase; font-style: italic; }
        .btn { width: 100%; padding: 20px; background: #ffee00; color: #000; border: none; border-radius: 15px; font-weight: 900; font-size: 16px; cursor: pointer; }
        .log-display { background: #111; color: #666; font-family: monospace; font-size: 10px; padding: 10px; border-radius: 10px; text-align: left; height: 100px; overflow-y: auto; margin-top: 10px; border: 1px solid #222; }
        #v { width: 100%; border-radius: 15px; display: none; margin-bottom: 15px; background: #111; aspect-ratio: 1/1; object-fit: cover; }
        .item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-size: 14px; }
    </style>
</head>
<body>

    <div class="box">
        <h1 style="margin:0;">VITO <span class="neon-yellow">COMMAND</span></h1>
        <div style="font-size: 10px; opacity: 0.5;">BAD HERSFELD | VERSION 59.0 FINAL</div>
    </div>

    <div class="box">
        <video id="v" autoplay playsinline muted></video>
        <div id="p-text" style="color:#333; font-weight: 900; padding: 20px;">SCOUTER BEREIT</div>
        <canvas id="c" style="display:none;"></canvas>
        <button id="sBtn" class="btn">EINHEIT ERFASSEN</button>
    </div>

    <div class="box" style="text-align: left;">
        <div class="neon-yellow" style="font-size: 12px; margin-bottom: 10px;">Bestand Zentrale:</div>
        <div id="inv-list">Suche Verbindung...</div>
    </div>

    <div class="log-display" id="debug-log">
        [SYSTEM START]...<br>
    </div>

    <button onclick="localStorage.removeItem('GRK'); location.reload();" style="color:#333; background:none; border:none; font-size:9px; text-decoration: underline; margin-top:10px;">API KEY RESET</button>

    <script>
        const dLog = (m) => { document.getElementById('debug-log').innerHTML += `> ${m}<br>`; };
        
        const fbCfg = { apiKey: "AIzaSyDqqn39l6M8r-YC-R5utkwfG4En2OfUnpQ", authDomain: "gen-lang-client-0348637849.firebaseapp.com", projectId: "gen-lang-client-0348637849", storageBucket: "gen-lang-client-0348637849.firebasestorage.app", messagingSenderId: "1008937513696", appId: "1:1008937513696:web:1c0a2bc7792daf689a5685" };

        let GRK = localStorage.getItem('GRK');
        if(!GRK) {
            dLog("Key-Abfrage gestartet.");
            GRK = prompt("VITO LOGIN: Bitte Groq API Key eingeben:");
            if(GRK) localStorage.setItem('GRK', GRK.trim());
        }

        try {
            firebase.initializeApp(fbCfg);
            const db = firebase.firestore();
            dLog("Firebase-Zentrale verbunden.");

            db.collection("inventory").orderBy("addedAt", "desc").onSnapshot(snap => {
                const items = snap.docs.map(d => d.data());
                dLog(`${items.length} Produkte im Bestand.`);
                document.getElementById('inv-list').innerHTML = items.map(i => `
                    <div class="item">
                        <span>${i.name}</span>
                        <span style="color:#ffee00">${i.mhd || 'OFFEN'}</span>
                    </div>
                `).join('') || "Keine Einträge.";
            }, err => dLog("DB-FEHLER: " + err.message));

        } catch (e) { dLog("CRITICAL INIT ERROR: " + e.message); }

        const vid = document.getElementById('v'), sBtn = document.getElementById('sBtn'), pText = document.getElementById('p-text');
        let camOn = false;

        sBtn.onclick = async () => {
            if(!camOn) {
                dLog("Kamera-Zugriff angefordert...");
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    vid.srcObject = s; vid.style.display = "block";
                    pText.style.display = "none";
                    camOn = true; sBtn.innerText = "JETZT SCANNEN";
                    dLog("Scouter ist LIVE.");
                } catch(e) { dLog("KAMERA-FEHLER: " + e.message); }
            } else {
                runScan();
            }
        };

        async function runScan() {
            sBtn.disabled = true; sBtn.innerText = "KI PRÜFT...";
            dLog("Sende Daten an Groq...");
            const can = document.getElementById('c'); can.width = 640; can.height = 640;
            can.getContext('2d').drawImage(vid, 0, 0, 640, 640);
            
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GRK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.2-11b-vision-preview",
                        messages: [{ role: "user", content: [
                            { type: "text", text: "JSON ONLY: { 'name': 'Produkt', 'mhd': 'Datum' }" },
                            { type: "image_url", image_url: { url: can.toDataURL('image/jpeg', 0.6) } }
                        ]}]
                    })
                });
                const j = await res.json();
                const content = j.choices[0].message.content;
                const d = JSON.parse(content.substring(content.indexOf('{'), content.lastIndexOf('}') + 1));
                
                dLog(`KI-Erfolg: ${d.name} erkannt.`);
                await firebase.firestore().collection("inventory").add({ ...d, zone: "FRIDGE", addedAt: firebase.firestore.FieldValue.serverTimestamp() });
                if(navigator.vibrate) navigator.vibrate(100);
            } catch(e) { dLog("KI-FEHLER: " + e.message); alert("Key prüfen!"); }
            
            sBtn.disabled = false; sBtn.innerText = "JETZT SCANNEN";
        }
    </script>
</body>
</html>
