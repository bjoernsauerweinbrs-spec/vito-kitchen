<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>VITO V61 ERASER</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        /* RADIKALER FARBWECHSEL: LILA ZUR KONTROLLE */
        body { background: #1a0033; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .nuke-box { border: 2px solid #ff00ff; border-radius: 20px; padding: 20px; background: #000; box-shadow: 0 0 30px #ff00ff; }
        .btn { width: 100%; padding: 20px; background: #ff00ff; color: #fff; border: none; border-radius: 15px; font-weight: 900; margin-top: 20px; }
        #log { text-align: left; font-family: monospace; font-size: 10px; color: #ff00ff; margin-top: 20px; background: #000; padding: 10px; height: 100px; overflow: auto; border: 1px solid #333; }
    </style>
</head>
<body>

    <script>
        // SOFORTIGER SERVICE-WORKER KILL (Zwingt alte Versionen zum Sterben)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for(let registration of registrations) {
                    registration.unregister();
                    console.log("Alter ServiceWorker gelöscht!");
                }
            });
        }
    </script>

    <div class="nuke-box">
        <h1 style="margin:0 italic;">VITO <span style="color:#ff00ff">V61 ERASER</span></h1>
        <p style="font-size: 10px; opacity: 0.7;">WLAN-READY / CACHE-NUKE ACTIVE</p>

        <div id="status-display" style="margin: 20px 0; font-weight: bold; color: #00ff41;">
            PRÜFE DATENBANK...
        </div>

        <video id="v" autoplay playsinline muted style="width:100%; border-radius: 15px; display:none; border: 1px solid #ff00ff;"></video>
        <button id="sBtn" class="btn">SCANNER STARTEN</button>
        
        <div id="log">Lade System...</div>
    </div>

    <script>
        const logger = document.getElementById('log');
        function write(msg) { logger.innerHTML += "<br>> " + msg; }

        const cfg = { apiKey: "AIzaSyDqqn39l6M8r-YC-R5utkwfG4En2OfUnpQ", authDomain: "gen-lang-client-0348637849.firebaseapp.com", projectId: "gen-lang-client-0348637849", storageBucket: "gen-lang-client-0348637849.firebasestorage.app", messagingSenderId: "1008937513696", appId: "1:1008937513696:web:1c0a2bc7792daf689a5685" };

        try {
            firebase.initializeApp(cfg);
            const db = firebase.firestore();
            write("Firebase-Verbindung OK.");
            
            db.collection("inventory").limit(1).onSnapshot(() => {
                document.getElementById('status-display').innerText = "HUB IN BAD HERSFELD LIVE ●";
                write("Datenstrom stabil.");
            });
        } catch(e) { write("Fehler: " + e.message); }

        const vid = document.getElementById('v'), sBtn = document.getElementById('sBtn');
        let camOn = false;

        sBtn.onclick = async () => {
            if(!camOn) {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                vid.srcObject = s; vid.style.display = "block";
                camOn = true; sBtn.innerText = "JETZT SCANNEN";
                write("Kamera aktiviert.");
            } else {
                write("KI-Analyse (Groq) wird eingeleitet...");
            }
        };
    </script>
</body>
</html>
